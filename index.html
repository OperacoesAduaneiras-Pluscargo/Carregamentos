<style>
  :root{
    --azul:#0099CC;--marinho:#1a3a5c;--azulclaro:#e6f5fb;--campo:#fffde7;
    --borda:#cfd8e3;--txt:#1f2d3d;--verde:#2e7d32;--vermelho:#c62828;--cinza:#7a8aa0;
  }
  *{box-sizing:border-box;font-family:'Segoe UI',Roboto,Arial,sans-serif}
  body{margin:0;background:#eef2f6;color:var(--txt);font-size:14px}
  button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;transition:.15s}
  button:hover{filter:brightness(1.05)}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--borda);border-radius:6px;background:var(--campo);font-size:13px}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--azul);outline-offset:-1px}
  textarea{resize:vertical;min-height:60px}
  label{font-size:12px;font-weight:600;color:var(--marinho);display:block;margin-bottom:3px}
  .hidden{display:none!important}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:140px}
  .btn-pri{background:var(--azul);color:#fff;font-weight:600}
  .btn-mar{background:var(--marinho);color:#fff;font-weight:600}
  .btn-grn{background:var(--verde);color:#fff;font-weight:600}
  .btn-red{background:var(--vermelho);color:#fff;font-weight:600}
  .btn-out{background:#fff;border:1px solid var(--borda);color:var(--marinho)}
  .btn-sm{padding:5px 9px;font-size:12px}
  .btn-yel{background:#f0a500;color:#fff;font-weight:600}
  .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px;margin-bottom:14px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0099CC 0%,#1a3a5c 100%)}
  #login .box{background:#fff;border-radius:16px;padding:38px 34px;width:340px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
  #login h1{margin:0 0 4px;color:var(--marinho);font-size:24px;letter-spacing:1px}
  #login p{margin:0 0 22px;color:var(--cinza);font-size:13px}
  #login label{margin-top:12px}
  #login button{width:100%;margin-top:20px;padding:11px;font-size:15px}
  #loginErr{color:var(--vermelho);font-size:12px;margin-top:10px;min-height:14px}
  #top{background:var(--marinho);color:#fff;display:flex;align-items:center;padding:0 18px;height:54px;
    position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  #top .brand{font-weight:700;letter-spacing:1px;font-size:18px}
  #top .tabs{display:flex;gap:4px;margin-left:30px}
  #top .tabs button{background:transparent;color:#cdd9e6;font-weight:600;padding:8px 16px;border-radius:6px}
  #top .tabs button.active{background:var(--azul);color:#fff}
  #top .user{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px}
  #top .user .badge{background:rgba(255,255,255,.15);padding:3px 9px;border-radius:12px;font-size:11px;text-transform:uppercase}
  #main{padding:18px;max-width:100%;margin:0}
  h2{color:var(--marinho);margin:0 0 14px;font-size:20px}
  h3{color:var(--azul);margin:18px 0 8px;font-size:15px;border-bottom:1px solid var(--azulclaro);padding-bottom:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--azulclaro);color:var(--marinho);text-align:left;padding:9px 10px;font-size:12px;text-transform:uppercase;white-space:nowrap}
  td{padding:8px 10px;border-bottom:1px solid #eef1f5}
  tr:hover td{background:#fafcfe}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .toolbar input,.toolbar select{width:auto;min-width:140px}
  .toolbar .grow{flex:1;min-width:200px}
  .resp-sel{min-width:130px;padding:4px 6px;font-size:12px}
  .pill{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block;text-transform:capitalize}
  .pill.aberto{background:#fff3cd;color:#856404}
  .pill.liberado{background:#d4edda;color:#155724}
  .pill.finalizado{background:#d4edda;color:#155724}
  .pill.pendente{background:#fff3cd;color:#856404}
  .pill.calculado{background:#cce5ff;color:#004085}
  .pill.enviado{background:#d4edda;color:#155724}
  .pill.debito{background:#f8d7da;color:#721c24}
  .pill.credito{background:#d4edda;color:#155724}
  .prog{background:#e9eef3;border-radius:8px;height:8px;overflow:hidden;min-width:80px}
  .prog>i{display:block;height:100%;background:var(--azul);transition:.3s}
  .overlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:flex;align-items:flex-start;
    justify-content:center;padding:30px 16px;z-index:100;overflow:auto}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:1080px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .modal .head{background:var(--marinho);color:#fff;padding:14px 20px;border-radius:12px 12px 0 0;
    display:flex;align-items:center;justify-content:space-between}
  .modal .head h3{color:#fff;border:none;margin:0;font-size:17px}
  .modal .head .x{background:transparent;color:#fff;font-size:22px;padding:0 6px}
  .modal .subtabs{display:flex;gap:2px;background:#f1f5f9;padding:8px 14px 0}
  .modal .subtabs button{background:#dde6ef;color:var(--marinho);font-weight:600;border-radius:8px 8px 0 0;padding:9px 16px}
  .modal .subtabs button.active{background:#fff;color:var(--azul)}
  .modal .body{padding:18px 20px;max-height:78vh;overflow:auto}
  .modal .foot{padding:12px 20px;border-top:1px solid #eef1f5;display:flex;gap:10px;justify-content:flex-end}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
  .field{margin-bottom:4px}
  .checkitem{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f4f8;flex-wrap:wrap}
  .checkitem input[type=checkbox]{width:18px;height:18px;flex:none}
  .checkitem label{margin:0;font-weight:500;color:var(--txt);flex:1;min-width:160px}
  .checkitem .dt-wrap{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .checkitem .dt-wrap input[type=date]{max-width:148px}
  .checkitem .dt-wrap select{max-width:90px}
  .check-sec{background:#f7fafc;border:1px solid #e4ecf3;border-radius:8px;padding:12px 14px;margin-bottom:12px}
  .check-sec b{color:var(--marinho);display:block;margin-bottom:6px}
  .alerta{background:#f8d7da;color:#721c24;padding:10px 12px;border-radius:6px;font-weight:600;margin:8px 0}
  .emailprev{border:1px solid var(--borda);border-radius:8px;overflow:auto;background:#fff;max-height:340px}
  .lanc-row{display:grid;grid-template-columns:1.3fr 2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
  .saldo-box{display:flex;gap:18px;background:var(--azulclaro);border-radius:8px;padding:12px 16px;margin:10px 0;font-weight:600;flex-wrap:wrap}
  .saldo-box span{color:var(--marinho)}
  .saldo-box b{font-size:16px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--marinho);color:#fff;
    padding:11px 20px;border-radius:8px;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3);font-size:13px}
  .muted{color:var(--cinza);font-size:12px}
  .empty{text-align:center;color:var(--cinza);padding:30px}
  /* Documentos */
  .doc-mode-tabs{display:flex;gap:8px;margin-bottom:18px}
  .doc-mode-tabs button{padding:10px 22px;font-weight:600;border-radius:8px}
  .doc-prev{background:#f8fafc;border:1px solid var(--borda);border-radius:8px;padding:24px 30px;
    font-family:Georgia,serif;font-size:13px;line-height:1.8;max-height:60vh;overflow:auto;color:#111}
  .doc-prev h4{text-align:center;text-transform:uppercase;font-size:14px;margin-bottom:6px}
  .doc-prev p{margin:0 0 10px;text-align:justify}
  .lote-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr auto;gap:6px;align-items:end;margin-bottom:6px;font-size:12px}
  .lote-row input,.lote-row select{font-size:12px;padding:5px 7px}
  .badge-doc{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-proc{background:#cce5ff;color:#004085}
  .badge-cont{background:#d4edda;color:#155724}
  .upload-zone{border:2px dashed var(--borda);border-radius:10px;padding:30px;text-align:center;
    cursor:pointer;transition:.2s;background:#fafcfe}
  .upload-zone:hover{border-color:var(--azul);background:var(--azulclaro)}
  .filial-block{background:#f1f5f9;border:1px solid #dde6ef;border-radius:8px;padding:12px;margin-bottom:10px}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h1>PLUSCARGO</h1>
    <p>Operações Aduaneiras</p>
    <label>Login</label>
    <input id="lgUser" placeholder="ex: lucas.plus" autocomplete="username">
    <label>Senha</label>
    <input id="lgPass" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-pri" onclick="doLogin()">Entrar</button>
    <div id="loginErr"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="top">
    <span class="brand">PLUSCARGO</span>
    <div class="tabs" id="tabs"></div>
    <div class="user">
      <span id="uName"></span>
      <span class="badge" id="uBadge"></span>
      <button class="btn-sm btn-out" id="btnAlertas" onclick="abrirAlertas()" style="display:none"></button>
      <button class="btn-out btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="main"></div>
</div>

<div id="empilhOverlay" class="hidden" style="position:fixed;inset:0;background:rgba(20,30,45,.55);
  display:flex;align-items:center;justify-content:center;z-index:200">

      <button class="x" onclick="document.getElementById('empilhOverlay').classList.add('hidden')">×</button></div>
    <div class="body" id="empilhMsg" style="padding:20px"></div>
    <div class="foot">
      <button class="btn-out" id="empilhNao">Cancelar</button>
      <button class="btn-pri" id="empilhSim">Confirmar</button>
    </div>
  </div>
</div>

<script>
/* ========== CONFIG ========== */
const URL_SB='https://inohrwbdeakiqztvupdq.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlub2hyd2JkZWFraXF6dHZ1cGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTA1OTQsImV4cCI6MjA5NjI4NjU5NH0.tm5gVl_0IlqSmmbktfCbUy6fcF9tPWWkX4JcC4psIOk';
const PLUS_BANCO={banco:'Banco do Brasil (001)',agencia:'3146-1',conta:'41517-0',
  titular:'PLUSCARGO INTERNACIONAL LTDA',cnpj:'04.389.187/0001-18',pix:'financial@pluscargo.com.br'};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function mesLabel(m){if(!m)return'Sem mês';const[y,mo]=m.split('-');return(MESES[+mo-1]||mo)+'/'+y}

/* ========== STORAGE ========== */
const _mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return _mem[k]??null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){_mem[k]=v}},
  del(k){try{localStorage.removeItem(k)}catch(e){delete _mem[k]}}
};

/* ========== SUPABASE ========== */
async function sb(table,{method='GET',q='',body=null,prefer=''}={}){
  const opt={method,headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'}};
  if(prefer)opt.headers.Prefer=prefer;
  if(body)opt.body=JSON.stringify(body);
  const res=await fetch(`${URL_SB}/rest/v1/${table}${q}`,opt);
  if(!res.ok){const t=await res.text();throw new Error(t||res.status)}
  if(method==='DELETE')return true;
  const txt=await res.text();return txt?JSON.parse(txt):[];
}
const sbGet=(t,q='')=>sb(t,{q});
const sbIns=(t,b)=>sb(t,{method:'POST',body:b,prefer:'return=representation'});
const sbUpd=(t,id,b)=>sb(t,{method:'PATCH',q:`?id=eq.${id}`,body:b,prefer:'return=representation'});
const sbDel=(t,id)=>sb(t,{method:'DELETE',q:`?id=eq.${id}`});

/* ========== STATE ========== */
let user=null;
let cache={clientes:[],transportadoras:[],locais:[],emailsTransp:[],emailsCli:[],
  honorarios:[],bancos:[],agentes:[],tiposAgenc:[],tiposImp:[],usuarios:[]};
let activeTab=null;

/* ========== HELPERS ========== */
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtBRL=n=>(Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const parseNum=s=>{if(s==null||s==='')return 0;return Number(String(s).replace(/\./g,'').replace(',','.'))||0};
function maskMoney(input){
  input.addEventListener('input',function(){
    let v=this.value.replace(/\D/g,'');
    if(!v){this.value='';return}
    v=(parseInt(v,10)/100).toFixed(2);
    this.value=Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  });
}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
async function copy(text,html){
  try{
    if(html&&window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({
        'text/html':new Blob([html],{type:'text/html'}),
        'text/plain':new Blob([text],{type:'text/plain'})})]);
    }else{await navigator.clipboard.writeText(text)}
    toast('Copiado!');
  }catch(e){
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();try{document.execCommand('copy');toast('Copiado!')}catch(_){toast('Falha ao copiar')}
    ta.remove();
  }
}
function maskCNPJ(v){
  v=(v||'').replace(/\D/g,'').slice(0,14);
  if(v.length>12)return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2}).*/,'$1.$2.$3/$4-$5');
  if(v.length>8)return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4}).*/,'$1.$2.$3/$4');
  if(v.length>5)return v.replace(/^(\d{2})(\d{3})(\d{0,3}).*/,'$1.$2.$3');
  if(v.length>2)return v.replace(/^(\d{2})(\d{0,3}).*/,'$1.$2');
  return v;
}
function validaCNPJ(c){
  c=(c||'').replace(/\D/g,'');
  if(c.length!==14||/^(\d)\1{13}$/.test(c))return false;
  const dv=n=>{const p=n.length===12?[5,4,3,2,9,8,7,6,5,4,3,2]:[6,5,4,3,2,9,8,7,6,5,4,3,2];
    let s=0;for(let i=0;i<n.length;i++)s+=parseInt(n[i])*p[i];const r=s%11;return r<2?0:11-r;};
  const d1=dv(c.slice(0,12));const d2=dv(c.slice(0,12)+d1);
  return c===c.slice(0,12)+''+d1+d2;
}
function capitaliza(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
function fmtDTcurto(v){
  if(!v)return'<span class="muted">—</span>';
  const d=new Date(v);if(isNaN(d))return'<span class="muted">—</span>';
  const dia=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const hora=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  return`<b style="font-size:11px">${dia}</b><br><span class="muted" style="font-size:10px">${hora}</span>`;
}
function horaOpts(cur){
  const out=[];
  for(let h=6;h<=22;h++)for(let m=0;m<60;m+=15){
    const v=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    out.push(`<option${cur===v?' selected':''}>${v}</option>`);
  }
  return out.join('');
}
function parseDT(v){if(!v)return{d:'',t:''};const[d,t]=(v+'T').split('T');return{d,t:(t||'').slice(0,5)}}
function joinDT(d,t){if(!d)return'';return d+(t?'T'+t+':00':'')}
function joinProcDT(field,dId,tId){
  const d=document.getElementById(dId)?.value||'';
  const t=document.getElementById(tId)?.value||'';
  curProc[field]=joinDT(d,t);
}
const opts=(arr,sel,key='nome')=>['<option value="">— selecione —</option>',
  ...arr.map(o=>`<option value="${esc(o[key])}" ${o[key]===sel?'selected':''}>${esc(o[key])}</option>`)].join('');

/* ========== LOGIN ========== */
async function doLogin(){
  const login=$('#lgUser').value.trim().toLowerCase();
  const pass=$('#lgPass').value;
  $('#loginErr').textContent='';
  if(!login){$('#loginErr').textContent='Informe o login';return}
  try{
    const r=await sbGet('usuarios',`?login=eq.${encodeURIComponent(login)}&select=*`);
    if(!r.length){$('#loginErr').textContent='Usuário não encontrado';return}
    const u=r[0];
    if(u.senha&&pass&&u.senha!==pass){$('#loginErr').textContent='Senha incorreta';return}
    user=u;store.set('plus_user',JSON.stringify(u));startApp();
  }catch(e){$('#loginErr').textContent='Erro de conexão.';console.error(e)}
}
function logout(){store.del('plus_user');location.reload()}

/* ========== APP BOOT ========== */
async function startApp(){
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#uName').textContent=user.nome||user.login;
  $('#uBadge').textContent=user.perfil;
  buildTabs();
  await loadCache();
  const def=user.perfil==='financeiro'?'fechamento':'processos';
  go(def);
  await carregarAlertas();
  if(alertasVenc.length)abrirAlertas();
}
let alertasVenc=[];
async function carregarAlertas(){
  alertasVenc=[];
  try{
    const vs=await sbGet('vencimentos_cliente','?select=*');
    const hoje=new Date();hoje.setHours(0,0,0,0);
    const info={};cache.clientes.forEach(c=>info[c.nome]={grupo:c.grupo||'',cnpj:c.cnpj||''});
    vs.forEach(v=>{if(!v.vencimento)return;
      const d=new Date(v.vencimento+'T00:00:00');const dias=Math.round((d-hoje)/86400000);
      if(dias<=30)alertasVenc.push({...v,dias,grupo:(info[v.cliente]||{}).grupo||'',cnpj:(info[v.cliente]||{}).cnpj||''});});
    alertasVenc.sort((a,b)=>a.dias-b.dias);
  }catch(e){console.error('alertas',e)}
  const b=$('#btnAlertas');if(b){
    if(alertasVenc.length){const venc=alertasVenc.filter(a=>a.dias<0).length;
      b.style.display='';b.textContent='Vencimentos ('+alertasVenc.length+')';
      b.className='btn-sm '+(venc?'btn-red':'btn-out');
    }else b.style.display='none';
  }
}
function abrirAlertas(){
  const rows=alertasVenc.length?alertasVenc.map(a=>{
    const txt=String(a.vencimento).split('-').reverse().join('/');
    const cor=a.dias<0?'background:#f8d7da;color:#721c24':'background:#fff3cd;color:#856404';
    const st=a.dias<0?'Vencido há '+(-a.dias)+' dia(s)':'Vence em '+a.dias+' dia(s)';
    return`<tr><td>${a.grupo?'<span class="muted">'+esc(a.grupo)+'</span><br>':''}<b>${esc(a.cliente)}</b></td>
      <td>${esc(a.tipo)}</td><td>${txt}</td><td><span class="pill" style="${cor}">${st}</span></td></tr>`}).join('')
    :'<tr><td colspan="4" class="empty">Nenhum vencimento nos próximos 30 dias.</td></tr>';
  const ov=document.createElement('div');ov.className='overlay';ov.id='alertOverlay';
  ov.innerHTML=`<div class="modal" style="max-width:760px"><div class="head">
    <h3>Alertas de Vencimento</h3><button class="x" onclick="closeOverlay('alertOverlay')">×</button></div>
    <div class="body"><table><thead><tr><th>Cliente</th><th>Tipo</th><th>Vencimento</th><th>Situação</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <div class="foot"><button class="btn-pri" onclick="closeOverlay('alertOverlay')">Fechar</button></div></div>`;
  document.body.appendChild(ov);
}
function tabsForProfile(){
  const p=user.perfil;const t=[];
  if(p==='admin'||p==='carregamento')t.push({id:'processos',label:'Processos'});
  if(p==='admin'||p==='financeiro')t.push({id:'fechamento',label:'Fechamento'});
  t.push({id:'documentos',label:'Documentos'});
  t.push({id:'cadastros',label:'Cadastros'});
  return t;
}
function buildTabs(){
  $('#tabs').innerHTML=tabsForProfile().map(t=>
    `<button data-tab="${t.id}" onclick="go('${t.id}')">${t.label}</button>`).join('');
}
function go(tab){
  activeTab=tab;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='processos')renderProcessos();
  else if(tab==='fechamento')renderFechamento();
  else if(tab==='documentos')renderDocumentos();
  else if(tab==='cadastros')renderCadastros();
}

  const faltas=obrig.filter(k=>!d[k]);

    razao:'Razão Social',cnpj:'CNPJ',rua:'Rua',num:'Número',bairro:'Bairro',cep:'CEP',
    cidade:'Cidade',uf:'UF',rep_nome:'Nome do representante',rep_cpf:'CPF',rep_rg:'RG',
    cidade_ass:'Cidade de assinatura',data_raw:'Data'}[k]||k)).join(', '));return false}
  return true;
}

/* ---------- GERAR DOCX (via blob RTF-like / texto simples) ---------- */
/* Nota: geração de .docx real exige docxtemplater/pizzip (libs pesadas).
   Aqui geramos um arquivo .doc (HTML embutido) que o Word abre nativamente,
   mantendo formatação e sem dependências extras. */
function buildDocHtml(txt,titulo){
  return`<html xmlns:o='urn:schemas-microsoft-com:office:office'
    xmlns:w='urn:schemas-microsoft-com:office:word'
    xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='UTF-8'>
  <style>
    body{font-family:'Times New Roman',serif;font-size:12pt;margin:3cm 3cm 2cm 3cm;line-height:1.5}
    h1{text-align:center;font-size:14pt;text-transform:uppercase}
    p{text-align:justify;margin:0 0 12pt}
    .ass{margin-top:40pt}
  </style></head>
  <body><pre style="font-family:'Times New Roman',serif;font-size:12pt;white-space:pre-wrap;line-height:1.5">${txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></body></html>`;
}
function gerarDocx(){
  const d=collectDocForm();
  if(!validateDocForm(d))return;
  const txt=d.tipo==='procuracao'?gerarTextoProcuracao(d):gerarTextoContrato(d);
  const html=buildDocHtml(txt,d.tipo==='procuracao'?'Procuração':'Contrato');
  const blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
  const nome=`${d.tipo==='procuracao'?'Procuracao':'Contrato'} - ${d.razao} - ${d.data_raw}.doc`;
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;a.click();
  registrarHistorico(d,'DOCX');
  toast('DOCX gerado');
}

/* ---------- GERAR PDF ---------- */
function gerarPdfDoc(){
  const d=collectDocForm();
  if(!validateDocForm(d))return;
  if(!window.jspdf||!window.jspdf.jsPDF){toast('Biblioteca PDF não carregada');return}
  const txt=d.tipo==='procuracao'?gerarTextoProcuracao(d):gerarTextoContrato(d);
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,ml=25,mr=25,mt=25,lw=W-ml-mr;
  doc.setFont('times','normal');doc.setFontSize(11);
  const linhas=doc.splitTextToSize(txt,lw);
  let y=mt;
  linhas.forEach(l=>{
    if(y>280){doc.addPage();y=mt}
    doc.text(l,ml,y);y+=6;
  });
  const nome=`${d.tipo==='procuracao'?'Procuracao':'Contrato'} - ${d.razao} - ${d.data_raw}.pdf`;
  doc.save(nome);
  registrarHistorico(d,'PDF');
  toast('PDF gerado');
}

    });

  }catch(e){console.error('histórico doc',e)}
}
async function loadDocHistorico(){

const LOTE_COLS_PROC=['razao_social','cnpj','rua','numero','complemento','bairro','cep','cidade','uf',
  'representante_nome','representante_nac','representante_ecivil','representante_prof',
  'representante_cpf','representante_rg','cidade_assinatura','data','validade_anos'];
const LOTE_COLS_CONT=['razao_social','cnpj','rua','numero','complemento','bairro','cep','cidade','uf',
  'representante_nome','representante_cpf','representante_rg','cidade_assinatura','data',
  'filial_razao','filial_cnpj','filial_rua','filial_numero','filial_bairro','filial_cep','filial_cidade','filial_uf'];

function downloadModeloExcel(){
  if(!window.XLSX){toast('Biblioteca Excel não carregada');return}
  const cols=docTipo==='procuracao'?LOTE_COLS_PROC:LOTE_COLS_CONT;
  const ws=XLSX.utils.aoa_to_sheet([cols]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Modelo');
  XLSX.writeFile(wb,`Modelo_${docTipo==='procuracao'?'Procuracao':'Contrato'}.xlsx`);
  toast('Modelo baixado');
}

function handleLoteDrop(e){
  e.preventDefault();
  const f=e.dataTransfer.files[0];if(!f)return;
  processarArquivoLote(f);
}
function importarLote(input){
  const f=input.files[0];if(!f)return;
  processarArquivoLote(f);
}
function processarArquivoLote(file){
  if(!window.XLSX){toast('Biblioteca Excel não carregada');return}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){toast('Planilha vazia');return}
      loteRows=rows;
      renderLotePreview();
    }catch(err){toast('Erro ao ler planilha: '+err.message)}
  };
  reader.readAsBinaryString(file);
}
function renderLotePreview(){
  const el=document.getElementById('lotePreview');if(!el)return;
  if(!loteRows.length){el.innerHTML='';return}
  const cols=docTipo==='procuracao'?LOTE_COLS_PROC:LOTE_COLS_CONT;
  const erros=loteRows.map((r,i)=>{
    const f=[];
    if(!r.razao_social)f.push('razao_social');
    if(!r.cnpj)f.push('cnpj');
    if(!r.representante_nome)f.push('representante_nome');
    if(!r.representante_cpf)f.push('representante_cpf');
    if(!r.data)f.push('data');
    return f.length?`Linha ${i+2}: falta ${f.join(', ')}`:null;
  }).filter(Boolean);

  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <b style="color:var(--marinho)">${loteRows.length} registro(s) carregado(s)</b>
      <div style="display:flex;gap:8px">
        <button class="btn-pri" onclick="gerarLoteDocx()">⬇ Gerar todos DOCX</button>
        <button class="btn-grn" onclick="gerarLotePdf()">⬇ Gerar todos PDF</button>
      </div>
    </div>
    ${erros.length?`<div class="alerta" style="margin-bottom:10px">⚠ Campos faltando:<br>${erros.join('<br>')}</div>`:''}
    <div style="overflow-x:auto;max-height:320px">
    <table><thead><tr>${cols.slice(0,8).map(c=>`<th>${c}</th>`).join('')}<th>...</th></tr></thead>
    <tbody>${loteRows.map((r,i)=>`<tr>${cols.slice(0,8).map(c=>`<td>${esc(r[c]||'')}</td>`).join('')}<td class="muted">...</td></tr>`).join('')}
    </tbody></table></div>`;
}

function loteRowToData(r){
  const fmtData=d=>{
    if(!d)return'';
    // suporta dd/mm/yyyy ou yyyy-mm-dd
    let p=String(d).trim();
    if(p.includes('/')){const[dd,mm,yyyy]=p.split('/');return`${dd} de ${MESES[+mm-1]} de ${yyyy}`}
    if(p.includes('-')){const[yyyy,mm,dd]=p.split('-');return`${dd} de ${MESES[+mm-1]} de ${yyyy}`}
    return p;
  };
  const filiais=r.filial_cnpj?[{razao:r.filial_razao||'',cnpj:r.filial_cnpj,
    rua:r.filial_rua||'',num:r.filial_numero||'',bairro:r.filial_bairro||'',
    cep:r.filial_cep||'',cidade:r.filial_cidade||'',uf:r.filial_uf||''}]:[];
  return{
    tipo:docTipo,
    razao:r.razao_social||'',cnpj:r.cnpj||'',ie:'',
    rua:r.rua||'',num:r.numero||'',compl:r.complemento||'',
    bairro:r.bairro||'',cep:r.cep||'',cidade:r.cidade||'',uf:r.uf||'',
    rep_nome:r.representante_nome||'',rep_nac:r.representante_nac||'brasileiro',
    rep_ecivil:r.representante_ecivil||'',rep_prof:r.representante_prof||'empresário',
    rep_cpf:r.representante_cpf||'',rep_rg:r.representante_rg||'',
    cidade_ass:r.cidade_assinatura||'',data_raw:String(r.data||''),
    data_fmt:fmtData(r.data),
    validade:String(r.validade_anos||'3'),
    filiais,
  };
}

async function gerarLoteDocx(){
  if(!loteRows.length){toast('Nenhum registro carregado');return}
  // gera um .doc por registro e faz download individual
  let ok=0;
  for(const r of loteRows){
    const d=loteRowToData(r);
    const txt=d.tipo==='procuracao'?gerarTextoProcuracao(d):gerarTextoContrato(d);
    const html=buildDocHtml(txt,'');
    const blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
    const nome=`${d.tipo==='procuracao'?'Procuracao':'Contrato'} - ${d.razao||'SEM_NOME'} - ${d.data_raw}.doc`;
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;a.click();
    await new Promise(r=>setTimeout(r,300));
    registrarHistorico(d,'DOCX (lote)');
    ok++;
  }
  toast(`${ok} arquivo(s) DOCX gerado(s)`);
}

async function gerarLotePdf(){
  if(!loteRows.length){toast('Nenhum registro carregado');return}
  if(!window.jspdf||!window.jspdf.jsPDF){toast('Biblioteca PDF não carregada');return}
  const{jsPDF}=window.jspdf;
  for(const r of loteRows){
    const d=loteRowToData(r);
    const txt=d.tipo==='procuracao'?gerarTextoProcuracao(d):gerarTextoContrato(d);
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,ml=25,mr=25,mt=25,lw=W-ml-mr;
    doc.setFont('times','normal');doc.setFontSize(11);
    const linhas=doc.splitTextToSize(txt,lw);
    let y=mt;
    linhas.forEach(l=>{if(y>280){doc.addPage();y=mt}doc.text(l,ml,y);y+=6;});
    const nome=`${d.tipo==='procuracao'?'Procuracao':'Contrato'} - ${d.razao||'SEM_NOME'} - ${d.data_raw}.pdf`;
    doc.save(nome);
    await new Promise(r=>setTimeout(r,300));
    registrarHistorico(d,'PDF (lote)');
  }
  toast(`${loteRows.length} PDF(s) gerado(s)`);
}

async function saveProc(){
  collectProcDados();const p=curProc;
  const isFCL=p.modalidade==='FCL';const isLCLair=p.modalidade==='LCL'||p.modalidade==='Aéreo';
  const faltas=[];
  if(!p.ns)faltas.push('NS');if(!p.cliente)faltas.push('Cliente');if(!p.modalidade)faltas.push('Modalidade');
  if(!p.bl)faltas.push(p.modalidade==='Aéreo'?'AWB':'BL');if(isFCL&&!p.container)faltas.push('Container');
  if(!p.volumes)faltas.push('Volumes');if(!p.peso)faltas.push('Peso');if(isLCLair&&!p.cubagem)faltas.push('Cubagem');
  if(!p.dt_recebimento)faltas.push('Recebimento');
  if(faltas.length){alert('Obrigatórios:\n\n'+faltas.join(', '));return}
  const payload={si:p.si,ns:p.ns,ref_cliente:p.ref_cliente,cliente:p.cliente,modalidade:p.modalidade,
    transportadora:p.transportadora,bl:p.bl,container:p.container,duimp:p.duimp,nf:p.nf,coleta:p.coleta,
    entrega:p.entrega,volumes:p.volumes,peso:p.peso,cubagem:p.cubagem,empilhavel:p.empilhavel,
    p1:p.p1||null,p2:p.p2||null,p3:p.p3||null,obs:p.obs,operador:p.operador||user.nome,
    status:p.status||'aberto',dt_recebimento:p.dt_recebimento||null};
  try{
    if(p.id){await sbUpd('processos',p.id,payload)}
    else{payload.dt_abertura=new Date().toISOString();payload.data_abertura=payload.dt_abertura;
      const r=await sbIns('processos',payload);curProc.id=r[0].id;curProc.dt_abertura=payload.dt_abertura;}
    toast('Processo salvo');closeOverlay('procOverlay');renderProcessos();
  }catch(e){console.error(e);alert('Erro:\n\n'+((e&&e.message)||''))}
}

const chkRow=k=>curChecklist.find(c=>c.item===k);
const chkDone=k=>!!chkRow(k)?.concluido;

      }
    }
    avaria+=`</div>`;}
  let devolucao='';

        <select id="ck_t_dev_vazio" onchange="setDT('dev_vazio',document.getElementById('ck_d_dev_vazio').value,this.value)"><option value="">--:--</option>${horaOpts(t)}</select>`;})()}
    </div></div></div>`;}
  let desbloqueio='';
  if(isFCL||p.modalidade==='LCL'){
    const lbl=isFCL?'CE desbloqueado junto ao armador?':'BL desbloqueado junto ao terminal?';
    const aviso=chkVal('desbloqueio')==='NÃO'?`<div class="alerta">⚠ ${isFCL?'CE':'BL'} bloqueado.</div>`:'';
    desbloqueio=`<div class="check-sec"><b>Desbloqueio BL/CE</b>${ckSelect('desbloqueio',lbl,['SIM','NÃO'])}${aviso}</div>`;}

      <div class="prog" style="flex:1;height:12px"><i style="width:${pc}%"></i></div>
      <b style="color:var(--marinho)">${done}/${total} (${pc}%)</b></div>
    ${desbloqueio}${secBox(CHK.averbacao)}${secBox(CHK.armazenagem)}${secBox(CHK.liberacao)}${secBox(CHK.transporte)}${avaria}${devolucao}

  if(lav==='AGUARDANDO INFORMAÇÃO')return{label:'Aguardando informação',short:'Pendente',tone:'pend'};

  if(is==='SIM'){if(v.av_comp_depot==='SIM')return{label:'Avaria ISENTA',short:'Isenta',tone:'ok'};
    return{label:'Avaria isenta — comprovante ao DEPOT pendente',short:'Pendente',tone:'pend'};}
  if(is==='EM ANÁLISE'||!is)return{label:'Avaria EM ANÁLISE',short:'Em análise',tone:'analise'};
  if(v.av_pag_fin!=='SIM')return{label:'Avaria PENDENTE — pagamento não solicitado',short:'Pendente',tone:'pend'};
  if(v.av_comp_rec==='SIM'&&v.av_comp_pasta==='SIM')return{label:'Avaria resolvida (paga)',short:'Resolvida',tone:'ok'};

const CAT_TIPO={Adiantamento:'credito',Agenciamento:'debito','Impostos Federais':'debito',ICMS:'debito',AFRMM:'debito',Armazenagem:'debito','Frete Rodoviário':'debito','Honorário de Despacho':'debito','Retenção IRRF/PCC':'credito',Demurrage:'debito','Lavagem/Avaria de Container':'debito',Outros:'debito'};
const SUB_CATS=['Agenciamento','Impostos Federais'];
const AGENC_SUBS=['Frete Marítimo','Frete Aéreo','Collect Fee','Delivery Fee','Seguro','THC','BL Fee','Capatazia','Scanner','ISPS','Handling','Outros'];
const IMP_SUBS=['Imposto de Importação (II)','IPI Nacionalização','PIS Nacionalização','COFINS Nacionalização','Taxa de Utilização do Siscomex','Outros'];
function lancAutomaticos(modalidade,honorarios,cliente){
  const isMar=modalidade==='FCL'||modalidade==='LCL';const isAer=modalidade==='Aéreo';const isRod=modalidade==='Rodoviário';
  const lancs=[{categoria:'Adiantamento',descricao:'',valor:0,tipo:'credito'},{categoria:'Agenciamento',tipo:'debito',agente:'',subs:[]},
    {categoria:'Impostos Federais',tipo:'debito',agente:'',subs:[]}];
  if(!isAer&&!isRod)lancs.push({categoria:'ICMS',descricao:'',valor:0,tipo:'debito'});
  if(isMar)lancs.push({categoria:'AFRMM',descricao:'',valor:0,tipo:'debito'});
  lancs.push({categoria:'Armazenagem',descricao:'',valor:0,tipo:'debito'},{categoria:'Frete Rodoviário',descricao:'',valor:0,tipo:'debito'});
  const hlist=(honorarios||[]).filter(x=>(x.cliente||'').trim()===cliente.trim());
  const h=hlist.find(x=>x.modal===modalidade)||hlist.find(x=>x.modal==='Todos'||!x.modal);
  lancs.push({categoria:'Honorário de Despacho',descricao:h?h.descricao||'Honorário de Despacho':'',valor:h?Number(h.valor)||0:0,tipo:'debito'});
  lancs.push({categoria:'Retenção IRRF/PCC',descricao:'',valor:0,tipo:'credito'});
  return lancs;}
function lancValor(l){if(l.subs&&l.subs.length)return l.subs.reduce((s,x)=>s+(Number(x.valor)||0),0);return Number(l.valor)||0}
function regroupLancs(rows){const out=[];const groups={};
  rows.forEach(r=>{if(SUB_CATS.includes(r.categoria)){
    if(!groups[r.categoria]){groups[r.categoria]={categoria:r.categoria,tipo:r.tipo,agente:'',subs:[]};out.push(groups[r.categoria])}
    let desc=r.descricao||'';let ag='';const m=desc.match(/^\[([^\]]+)\]\s*(.*)$/);
    if(m){ag=m[1];desc=m[2]}if(ag&&!groups[r.categoria].agente)groups[r.categoria].agente=ag;
    groups[r.categoria].subs.push({desc,valor:r.valor});
  }else out.push({categoria:r.categoria,descricao:r.descricao,valor:r.valor,tipo:r.tipo});});
  return out;}

  const catSel=`<select onchange="lancCat(${i},this.value)">${LANC_CATS.map(c=>`<option ${l.categoria===c?'selected':''}>${c}</option>`).join('')}</select>`;
  const tipoSel=`<select onchange="curLanc[${i}].tipo=this.value;updateSaldo()">
    <option value="credito" ${l.tipo==='credito'?'selected':''}>Crédito</option>
    <option value="debito" ${l.tipo==='debito'?'selected':''}>Débito</option></select>`;
  if(!SUB_CATS.includes(l.categoria)){return`<div class="lanc-row">
    <div><label>Categoria</label>${catSel}</div>
    <div><label>Descrição</label><input value="${esc(l.descricao)}" oninput="curLanc[${i}].descricao=this.value"></div>
    <div><label>Valor</label><input data-money="1" value="${fmtV(l.valor)}" placeholder="0,00"
      oninput="curLanc[${i}].valor=parseNum(this.value.replace(/\\./g,'').replace(',','.'));updateSaldo()"></div>
    <div><label>Tipo</label>${tipoSel}</div>
    <div><button class="btn-red btn-sm" onclick="curLanc.splice(${i},1);renderLancs()">×</button></div></div>`;}
  const isAgenc=l.categoria==='Agenciamento';const dl=isAgenc?'dlAgenc':'dlImp';
  if(!l.subs)l.subs=[];
  const subsHtml=l.subs.map((s,j)=>`
    <div style="display:grid;grid-template-columns:2fr 1fr auto;gap:8px;margin-bottom:6px">
      <input list="${dl}" placeholder="Sub-taxa" value="${esc(s.desc)}" oninput="curLanc[${i}].subs[${j}].desc=this.value">
      <input data-money="1" placeholder="0,00" value="${fmtV(s.valor)}"
        oninput="curLanc[${i}].subs[${j}].valor=parseNum(this.value.replace(/\\./g,'').replace(',','.'));refreshLancTotal(${i});updateSaldo()">
      <button class="btn-red btn-sm" onclick="curLanc[${i}].subs.splice(${j},1);renderLancs()">×</button></div>`).join('');
  return`<div class="check-sec" style="background:#eef6fb">
    <div style="display:grid;grid-template-columns:1.4fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px">
      <div><label>Categoria</label>${catSel}</div><div><label>Tipo</label>${tipoSel}</div>
      <div><button class="btn-red btn-sm" onclick="curLanc.splice(${i},1);renderLancs()">× remover</button></div></div>
    ${isAgenc?`<div class="field" style="margin-bottom:8px"><label>Agente de Carga</label><select onchange="curLanc[${i}].agente=this.value">${opts(cache.agentes,l.agente)}</select></div>`:''}
    <label>Sub-taxas</label>${subsHtml||'<div class="muted">Nenhuma.</div>'}
    <button class="btn-out btn-sm" onclick="addSub(${i})">+ Sub-taxa</button>
    <div style="text-align:right;margin-top:8px;font-weight:600;color:var(--marinho)">
      Total ${esc(l.categoria)}: <span id="lancTotal_${i}">${fmtBRL(lancValor(l))}</span></div></div>`;}
function addSub(i){if(!curLanc[i].subs)curLanc[i].subs=[];curLanc[i].subs.push({desc:'',valor:0});renderLancs()}
function refreshLancTotal(i){const el=$('#lancTotal_'+i);if(el)el.textContent=fmtBRL(lancValor(curLanc[i]))}
function lancCat(i,cat){curLanc[i].categoria=cat;curLanc[i].tipo=CAT_TIPO[cat]||'debito';
  if(SUB_CATS.includes(curLanc[i].categoria)&&!curLanc[i].subs)curLanc[i].subs=[];renderLancs()}
function addLanc(){curLanc.push({categoria:'Outros',descricao:'',valor:0,tipo:'debito'});renderLancs()}
function autoHonorario(){const cli=($('#ff_cli')?.value||'').trim();const mod=$('#ff_mod')?.value||'';if(!cli)return;
  if(!curFech.id&&curLanc.length===0){curLanc=lancAutomaticos(mod,cache.honorarios,cli);renderLancs();return}
  const hlist=cache.honorarios.filter(x=>(x.cliente||'').trim()===cli);
  const h=hlist.find(x=>x.modal===mod)||hlist.find(x=>x.modal==='Todos'||!x.modal);
  if(h){const lh=curLanc.find(l=>l.categoria==='Honorário de Despacho');
    if(lh&&!lh.valor){lh.valor=Number(h.valor)||0;lh.descricao=h.descricao||'Honorário de Despacho';renderLancs()}}}
function calcSaldo(){let d=0,c=0;curLanc.forEach(l=>{const v=lancValor(l);if(l.tipo==='credito')c+=v;else d+=v});return{d,c,saldo:d-c}}
function saldoInfo(){const{d,c,saldo}=calcSaldo();const cliente=(curFech&&curFech.cliente)||'CLIENTE';
  let status,favor;if(saldo>0.0001){status='débito';favor='PLUSCARGO'}
  else if(saldo<-0.0001){status='crédito';favor=cliente}else{status='finalizado';favor='—'}
  return{d,c,abs:Math.abs(saldo),status,favor};}
function updateSaldo(){const{d,c,abs,status,favor}=saldoInfo();
  const pillCls={'débito':'debito','crédito':'credito','finalizado':'finalizado','calculado':'calculado','enviado':'enviado'};
  $('#saldoBox').innerHTML=`<span>Débitos: <b>${fmtBRL(d)}</b></span><span>Créditos: <b>${fmtBRL(c)}</b></span>
    <span>Saldo: <b>${fmtBRL(abs)}</b></span><span class="pill ${pillCls[status]||''}" style="align-self:center">${capitaliza(status)}</span>
    <span style="align-self:center">A favor da <b>${esc(favor)}</b></span>`;
  const box=$('#dadosBancarios');if(box){
    if(status==='débito')box.innerHTML=bancoCard('Dados para pagamento — PLUSCARGO',PLUS_BANCO);
    else if(status==='crédito'){const b=findBancoCliente($('#ff_cli')?.value||'');
      box.innerHTML=b?bancoCard('Dados para devolução — Cliente',b):'<div class="muted" style="margin-top:8px">⚠ Sem dados bancários cadastrados.</div>'}
    else box.innerHTML=''}
  return status;}
function findBancoCliente(nome){if(!nome)return null;
  let b=cache.bancos.find(x=>(x.cliente||'').trim()===nome.trim());
  if(!b){const cli=cache.clientes.find(x=>x.nome===nome);
    if(cli&&cli.cnpj)b=cache.bancos.find(x=>(x.cnpj||'').replace(/\D/g,'')===cli.cnpj.replace(/\D/g,''));}
  return b||null;}
function bancoCard(t,b){return`<div class="check-sec" style="margin-top:10px"><b>${t}</b>
  <div class="grid2"><div>Banco: <b>${esc(b.banco)}</b></div><div>Agência: <b>${esc(b.agencia)}</b></div>
  <div>Conta: <b>${esc(b.conta)}</b></div><div>Titular: <b>${esc(b.titular)}</b></div>
  <div>CNPJ: <b>${esc(b.cnpj)}</b></div><div>PIX: <b>${esc(b.pix)}</b></div></div></div>`}
function collectFech(){const f=curFech;
  f.si=$('#ff_si').value;f.ns=$('#ff_ns').value;f.ref_cliente=$('#ff_ref').value;
  f.cliente=$('#ff_cli').value;f.modalidade=$('#ff_mod').value;f.transportadora=$('#ff_tr').value;
  f.bl=$('#ff_bl').value;f.container=$('#ff_cnt').value;f.analista=$('#ff_an').value;f.obs=$('#ff_obs').value;
  f.status=$('#ff_status')?.value||updateSaldo();}
async function saveFech(){collectFech();const f=curFech;
  const payload={si:f.si,ns:f.ns,ref_cliente:f.ref_cliente,cliente:f.cliente,modalidade:f.modalidade,
    transportadora:f.transportadora,bl:f.bl,container:f.container,responsavel:f.responsavel||user.nome,
    analista:f.analista,status:f.status,obs:f.obs,data_hora:new Date().toISOString()};
  try{let fid=f.id;
    if(fid){await sbUpd('fechamentos',fid,payload)}
    else{const r=await sbIns('fechamentos',payload);fid=r[0].id;curFech.id=fid}
    const old=await sbGet('fechamento_lancamentos',`?fechamento_id=eq.${fid}&select=id`);
    for(const o of old)await sbDel('fechamento_lancamentos',o.id);
    for(const l of curLanc){
      if(SUB_CATS.includes(l.categoria)&&l.subs?.length){
        for(const s of l.subs)await sbIns('fechamento_lancamentos',{fechamento_id:fid,categoria:l.categoria,
          descricao:((l.agente?'['+l.agente+'] ':'')+( s.desc||'')).trim(),valor:Number(s.valor)||0,tipo:l.tipo});
      }else await sbIns('fechamento_lancamentos',{fechamento_id:fid,categoria:l.categoria,descricao:l.descricao,valor:Number(l.valor)||0,tipo:l.tipo});}
    toast('Fechamento salvo');closeOverlay('fechOverlay');renderFechamento();
  }catch(e){console.error(e);$('#fechEmailOut').innerHTML=`<div class="alerta">Erro: ${esc(e.message||'')}</div>`;toast('Erro ao salvar')}}
async function delFech(){if(!confirm('Excluir?'))return;
  try{const old=await sbGet('fechamento_lancamentos',`?fechamento_id=eq.${curFech.id}&select=id`);
    for(const o of old)await sbDel('fechamento_lancamentos',o.id);
    await sbDel('fechamentos',curFech.id);toast('Excluído');closeOverlay('fechOverlay');renderFechamento()}catch(e){toast('Erro')}}
function fechSubject(){const f=curFech;return['FECHAMENTO DE PROCESSO',f.cliente,f.si,f.ns,f.ref_cliente,f.bl].map(x=>(x||'').toString().trim()).filter(Boolean).join(' | ')}
function fechEmailHTML(){collectFech();const f=curFech;const{abs,status,favor}=saldoInfo();
  const linha=(l,v)=>`<tr><td bgcolor="#e6f5fb" style="padding:6px 10px;color:#1a3a5c;font-weight:bold;border:1px solid #cfd8e3;width:40%">${l}</td><td style="padding:6px 10px;color:#000;border:1px solid #cfd8e3">${esc(v)}</td></tr>`;
  const lancRows=curLanc.map(l=>{
    if(SUB_CATS.includes(l.categoria)&&l.subs?.length){
      let h=`<tr><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#1a3a5c;font-weight:bold">${esc(l.categoria)}${l.agente?' — '+esc(l.agente):''}</td>
        <td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000;text-align:right;font-weight:bold">${l.tipo==='credito'?'(C) ':'(D) '}${fmtBRL(lancValor(l))}</td></tr>`;
      h+=l.subs.map(s=>`<tr><td style="padding:4px 10px 4px 26px;border:1px solid #cfd8e3;color:#000">&bull; ${esc(s.desc)}</td>
        <td style="padding:4px 10px;border:1px solid #cfd8e3;color:#000;text-align:right">${fmtBRL(s.valor)}</td></tr>`).join('');return h;}
    return`<tr><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000">${esc(l.categoria)}${l.descricao?' — '+esc(l.descricao):''}</td>
      <td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000;text-align:right">${l.tipo==='credito'?'(C) ':'(D) '}${fmtBRL(lancValor(l))}</td></tr>`;}).join('');
  let banco='';if(status==='débito')banco=bancoMail('Dados para pagamento — PLUSCARGO',PLUS_BANCO);

  return`<div style="font-family:Arial,sans-serif;font-size:13px;color:#000;margin-bottom:14px">Prezados,<br><br>Segue o fechamento do processo em referência.<br></div>
  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:680px;font-family:Arial;font-size:13px">
    <tr><td colspan="2" bgcolor="#0099CC" style="padding:12px 16px"><font color="#ffffff"><b style="font-size:16px">FECHAMENTO DE PROCESSO</b></font></td></tr>
    ${linha('Cliente',f.cliente)}${linha('SI',f.si)}${linha('NS',f.ns)}${linha('Ref. Cliente',f.ref_cliente)}${linha('Modalidade',f.modalidade)}${linha('BL/AWB',f.bl)}
    <tr><td colspan="2" bgcolor="#0099CC" style="padding:8px 16px"><font color="#ffffff"><b>LANÇAMENTOS</b></font></td></tr>
    ${lancRows}
    <tr><td style="padding:8px 10px;border:1px solid #cfd8e3;color:#1a3a5c;font-weight:bold">SALDO (${status})</td>
      <td style="padding:8px 10px;border:1px solid #cfd8e3;color:#000;text-align:right;font-weight:bold">${fmtBRL(abs)} &mdash; A FAVOR DA ${esc(favor)}</td></tr>
    <tr><td colspan="2" bgcolor="#0099CC" style="padding:10px 16px"><font color="#ffffff">PLUSCARGO Internacional Ltda</font></td></tr>
  </table>${banco}`;}
function genFechEmail(){
  try{collectFech();const f=curFech;
    const fin=cache.emailsCli.filter(e=>e.cliente===f.cliente&&e.tipo==='financeiro')
      .flatMap(e=>(e.email||'').split(/[;,]/)).map(s=>s.trim()).filter(Boolean);

      <div class="row" style="margin-top:10px">
        <button class="btn-out" id="copyFechDest">Copiar destinatários</button>
        <button class="btn-pri" id="copyFechBody">Copiar corpo</button>

function openFechOutlook(){const f=curFech;
  const to=cache.emailsCli.filter(e=>e.cliente===f.cliente&&e.tipo==='financeiro')
    .flatMap(e=>(e.email||'').split(/[;,]/)).map(s=>s.trim()).filter(Boolean).join(';');
  const body=$('#fechEmailOut .emailprev')?$('#fechEmailOut .emailprev').innerText:'';
  window.location.href='mailto:'+to+'?subject='+encodeURIComponent(fechSubject())+'&body='+encodeURIComponent(body);
  fechFlags.emailAberto=true;toast('E-mail aberto');}
function gerarPdfFechamento(){collectFech();const f=curFech;
  if(!window.jspdf?.jsPDF){toast('PDF não carregado');return}
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const{abs,status,favor}=saldoInfo();const W=210;
  doc.setFillColor(0,153,204);doc.rect(0,0,W,14,'F');doc.setTextColor(255);doc.setFontSize(13);doc.setFont(undefined,'bold');
  doc.text('PRESTAÇÃO DE CONTAS',W/2,9,{align:'center'});doc.setTextColor(0);doc.setFont(undefined,'normal');
  const idPairs=[['Cliente',f.cliente||''],['SI',f.si||''],['NS',f.ns||''],['Ref. Cliente',f.ref_cliente||''],['Modalidade',f.modalidade||''],['BL/AWB',f.bl||''],['Analista',f.analista||''],['Container',f.container||'']];
  const idBody=[];for(let i=0;i<idPairs.length;i+=2){const a=idPairs[i],b=idPairs[i+1]||['',''];idBody.push([a[0],a[1],b[0],b[1]])}
  doc.autoTable({startY:16,theme:'grid',styles:{fontSize:7,cellPadding:2},
    columnStyles:{0:{cellWidth:25,fontStyle:'bold'},1:{cellWidth:65},2:{cellWidth:25,fontStyle:'bold'},3:{cellWidth:65}},
    body:idBody,margin:{left:7,right:7}});
  const y0=doc.lastAutoTable.finalY;doc.setFillColor(0,153,204);doc.rect(7,y0,W-14,6,'F');
  doc.setTextColor(255);doc.setFontSize(8);doc.setFont(undefined,'bold');doc.text('LANÇAMENTOS',10,y0+4);
  doc.setTextColor(0);doc.setFont(undefined,'normal');
  const lancBody=[];curLanc.forEach(l=>{
    if(SUB_CATS.includes(l.categoria)&&l.subs?.length){
      lancBody.push([{content:l.categoria+(l.agente?' — '+l.agente:''),styles:{fontStyle:'bold'}},{content:(l.tipo==='credito'?'(C) ':'(D) ')+fmtBRL(lancValor(l)),styles:{fontStyle:'bold',halign:'right'}}]);
      l.subs.forEach(s=>lancBody.push(['  • '+(s.desc||''),{content:fmtBRL(s.valor),styles:{halign:'right'}}]));
    }else if(lancValor(l)>0||l.descricao){lancBody.push([l.categoria+(l.descricao?' — '+l.descricao:''),{content:(l.tipo==='credito'?'(C) ':'(D) ')+fmtBRL(lancValor(l)),styles:{halign:'right'}}]);}});
  doc.autoTable({startY:y0+6,theme:'grid',styles:{fontSize:7,cellPadding:2},body:lancBody,columnStyles:{1:{cellWidth:38}},margin:{left:7,right:7}});
  const y1=doc.lastAutoTable.finalY;doc.setFillColor(26,58,92);doc.rect(7,y1,W-14,8,'F');
  doc.setTextColor(255);doc.setFontSize(8);doc.setFont(undefined,'bold');
  doc.text(`SALDO (${status.toUpperCase()}): ${fmtBRL(abs)} — A FAVOR DA ${(favor||'').toUpperCase()}`,W/2,y1+5,{align:'center'});
  doc.setTextColor(0);doc.setFont(undefined,'normal');
  let banco=null,bt='';if(status==='débito'){banco=PLUS_BANCO;bt='Dados para pagamento — PLUSCARGO'}
  else if(status==='crédito'){banco=findBancoCliente(f.cliente||'');bt='Dados para devolução — Cliente'}
  if(banco){doc.autoTable({startY:y1+10,theme:'grid',styles:{fontSize:7,cellPadding:2},headStyles:{fillColor:[0,153,204],textColor:255,fontSize:7},
    head:[[bt,'']],body:[['Banco',banco.banco],['Agência / Conta',banco.agencia+' / '+banco.conta],['Titular',banco.titular],['CNPJ / PIX',banco.cnpj+' / '+banco.pix]],
    columnStyles:{0:{cellWidth:35,fontStyle:'bold'}},margin:{left:7,right:7}});}
  const yf=doc.lastAutoTable?doc.lastAutoTable.finalY+4:y1+14;
  doc.setFontSize(7);doc.setTextColor(120);doc.text('PLUSCARGO Internacional Ltda — Operações Aduaneiras',W/2,yf,{align:'center'});
  doc.save(('PRESTACAO DE CONTAS - '+(f.cliente||'')+' - '+(f.si||'')).replace(/[\\/:*?"<>|]/g,'-').trim()+'.pdf');
  fechFlags.pdfEmitido=true;toast('PDF gerado');}
function bancoMail(t,b){const r=(l,v)=>`<tr><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#1a3a5c;font-weight:bold">${l}</td><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000">${esc(v)}</td></tr>`;
  return`<table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:680px;margin-top:10px;font-family:Arial;font-size:13px">

function cadCell(f,r){const v=r[f[0]];
  if(f[2]==='date'){if(!v)return'<span class="muted">—</span>';
    const d=new Date(v+'T00:00:00');const hoje=new Date();hoje.setHours(0,0,0,0);
    const dias=Math.round((d-hoje)/86400000);const txt=String(v).split('-').reverse().join('/');
    const cor=dias<0?'background:#f8d7da;color:#721c24':dias<=30?'background:#fff3cd;color:#856404':'background:#d4edda;color:#155724';
    const tag=dias<0?' • Vencido':dias<=30?' • '+dias+'d':'';
    return`<span class="pill" style="${cor}">${txt}${tag}</span>`;}
  return esc(v);}
function renderCadTable(rows){const def=CAD_DEFS[curCad];
  $('#cadArea').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="margin:0;border:none">${def.label}</h3><button class="btn-pri btn-sm" onclick="openCadForm()">+ Adicionar</button></div>
    <table><thead><tr>${def.fields.map(f=>`<th>${f[1]}</th>`).join('')}<th></th></tr></thead><tbody>${
    rows.length?rows.map(r=>`<tr>${def.fields.map(f=>`<td>${cadCell(f,r)}</td>`).join('')}
      <td style="white-space:nowrap"><button class="btn-out btn-sm" onclick='openCadForm(${JSON.stringify(r)})'>Editar</button>
      <button class="btn-red btn-sm" onclick="delCad(${r.id})">×</button></td></tr>`).join('')
    :`<tr><td colspan="${def.fields.length+1}" class="empty">Nenhum registro.</td></tr>`}</tbody></table>`;}
function fieldInput(f,val){const[key,,extra]=f;
  if(extra==='date')return`<input type="date" id="cad_${key}" value="${esc(val)}">`;
  if(extra?.startsWith('sel:')){const src=extra.slice(4);return`<select id="cad_${key}">${opts(cache[src]||[],val)}</select>`}
  if(extra?.startsWith('opt:')){const o=extra.slice(4).split(',');
    return`<select id="cad_${key}"><option value="">—</option>${o.map(x=>`<option ${x===val?'selected':''}>${x}</option>`).join('')}</select>`}
  if(key==='cnpj')return`<input id="cad_${key}" value="${esc(val)}" placeholder="00.000.000/0000-00" oninput="this.value=maskCNPJ(this.value)">`;
  if(key==='valor')return`<input id="cad_${key}" data-money="1" value="${val?(Number(val)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):''}" placeholder="0,00">`;
  return`<input id="cad_${key}" value="${esc(val)}">`;}
function openCadForm(row){
  if(curCad==='clientes'){openClienteForm(row);return}
  const def=CAD_DEFS[curCad];const r=row||{};
  const ov=document.createElement('div');ov.className='overlay';ov.id='cadOverlay';
  ov.innerHTML=`<div class="modal" style="max-width:520px"><div class="head">
    <h3>${r.id?'Editar':'Novo'} — ${def.label}</h3><button class="x" onclick="closeOverlay('cadOverlay')">×</button></div>
    <div class="body">${def.fields.map(f=>`<div class="field"><label>${f[1]}</label>${fieldInput(f,r[f[0]])}</div>`).join('')}</div>
    <div class="foot"><button class="btn-out" onclick="closeOverlay('cadOverlay')">Cancelar</button>
      <button class="btn-pri" onclick='saveCad(${r.id||'null'})'>Salvar</button></div></div>`;
  document.body.appendChild(ov);
  document.querySelectorAll('#cadOverlay input[data-money]').forEach(el=>maskMoney(el));}
function openClienteForm(row){const r=row||{};const temGrupo=!!(r.grupo&&r.grupo.trim());
  const ov=document.createElement('div');ov.className='overlay';ov.id='cadOverlay';
  ov.innerHTML=`<div class="modal" style="max-width:520px"><div class="head">
    <h3>${r.id?'Editar':'Novo'} — Cliente</h3><button class="x" onclick="closeOverlay('cadOverlay')">×</button></div>
    <div class="body">
      <div class="field"><label>Nome Fantasia *</label><input id="cl_nome" value="${esc(r.nome)}"></div>
      <div class="field"><label>Razão Social *</label><input id="cl_razao" value="${esc(r.razao_social)}"></div>
      <div class="field"><label>CNPJ *</label><input id="cl_cnpj" value="${esc(r.cnpj)}" placeholder="00.000.000/0000-00" oninput="this.value=maskCNPJ(this.value)"></div>
      <label style="font-weight:500;display:flex;align-items:center;gap:8px;margin:12px 0 4px">
        <input type="checkbox" id="cl_temgrupo" style="width:auto" ${temGrupo?'checked':''}
          onchange="document.getElementById('cl_grupo_wrap').classList.toggle('hidden',!this.checked)">
        Faz parte de um grupo?</label>
      <div class="field ${temGrupo?'':'hidden'}" id="cl_grupo_wrap"><label>Nome do grupo</label>
        <input id="cl_grupo" value="${esc(r.grupo)}"></div></div>
    <div class="foot"><button class="btn-out" onclick="closeOverlay('cadOverlay')">Cancelar</button>
      <button class="btn-pri" onclick='saveCliente(${r.id||'null'})'>Salvar</button></div></div>`;
  document.body.appendChild(ov);}
async function saveCliente(id){
  const nome=$('#cl_nome').value.trim();const razao=$('#cl_razao').value.trim();const cnpj=$('#cl_cnpj').value.trim();
  const temGrupo=$('#cl_temgrupo').checked;const grupo=temGrupo?$('#cl_grupo').value.trim():'';
  if(!nome||!razao||!cnpj){alert('Preencha: Nome Fantasia, Razão Social e CNPJ.');return}
  if(!validaCNPJ(cnpj)){alert('CNPJ inválido.');return}
  const payload={nome,razao_social:razao,cnpj,grupo};
  try{if(id)await sbUpd('clientes',id,payload);else await sbIns('clientes',payload);
    toast('Cliente salvo');closeOverlay('cadOverlay');await loadCache();loadCad()}catch(e){alert('Erro:\n\n'+(e.message||''))}}
async function saveCad(id){const def=CAD_DEFS[curCad];const payload={};
  def.fields.forEach(f=>{const el=document.getElementById('cad_'+f[0]);if(!el)return;
    let v=el.value;if(f[0]==='valor')v=parseNum(v);payload[f[0]]=v;});
  try{if(id)await sbUpd(def.table,id,payload);else await sbIns(def.table,payload);
    toast('Salvo');closeOverlay('cadOverlay');await loadCache();loadCad()}catch(e){alert('Erro:\n\n'+(e.message||''))}}
async function delCad(id){if(!confirm('Excluir?'))return;const def=CAD_DEFS[curCad];
  try{await sbDel(def.table,id);toast('Excluído');await loadCache();loadCad()}catch(e){toast('Erro')}}

const VENC_TIPOS=['RADAR (Portal Único)','Procuração','Contrato de Despacho','Cadastro MAPA','AFE ANVISA','Cadastro IBAMA/CTF','Substabelecimento','Outros'];
let vencRows=[],vencClientes=[],vencGrupoFilter='';
async function loadVencimentos(){
  try{vencRows=await sbGet('vencimentos_cliente','?select=*')}catch(e){vencRows=[];toast('Erro')}
  renderVencMatrix();carregarAlertas();}
function renderVencMatrix(){
  vencClientes=cache.clientes.slice();
  const map={};vencRows.forEach(r=>{(map[r.cliente]=map[r.cliente]||{})[r.tipo]=r});
  const gruposAll=[...new Set(vencClientes.map(c=>(c.grupo||'').trim()).filter(Boolean))].sort();
  let clis=vencClientes.map((c,i)=>({c,i}));
  if(vencGrupoFilter)clis=clis.filter(o=>(o.c.grupo||'').trim()===vencGrupoFilter);
  const groups={};clis.forEach(o=>{const g=(o.c.grupo||'').trim()||'— Sem grupo —';(groups[g]=groups[g]||[]).push(o.i)});
  const gkeys=Object.keys(groups).sort((a,b)=>a==='— Sem grupo —'?1:b==='— Sem grupo —'?-1:a.localeCompare(b));
  const header=`<tr><th>Cliente</th>${VENC_TIPOS.map(t=>`<th>${esc(t)}</th>`).join('')}</tr>`;
  const body=gkeys.map(g=>{const rows=groups[g].map(i=>{const c=vencClientes[i];
    const cells=VENC_TIPOS.map((t,ti)=>{const r=(map[c.nome]||{})[t];
      return`<td style="cursor:pointer" onclick="editVenc(${i},${ti})">${r&&r.vencimento?`<span class="pill" style="${(()=>{const d=new Date(r.vencimento+'T00:00:00');const h=new Date();h.setHours(0,0,0,0);const ds=Math.round((d-h)/86400000);return ds<0?'background:#f8d7da;color:#721c24':ds<=30?'background:#fff3cd;color:#856404':'background:#d4edda;color:#155724'})()">${r.vencimento.split('-').reverse().join('/')}</span>`:'<span class="muted">—</span>'}</td>`}).join('');
    return`<tr><td><b>${esc(c.nome)}</b></td>${cells}</tr>`}).join('');
    return`<tr><td colspan="${VENC_TIPOS.length+1}" style="background:#eef6fb;font-weight:700;color:var(--marinho)">${esc(g)}</td></tr>${rows}`;}).join('');
  $('#cadArea').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap">
      <h3 style="margin:0;border:none">Vencimentos por Cliente</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <select onchange="vencGrupoFilter=this.value;renderVencMatrix()" style="width:auto">
          <option value="">Todos os grupos</option>
          ${gruposAll.map(g=>`<option value="${esc(g)}" ${vencGrupoFilter===g?'selected':''}>${esc(g)}</option>`).join('')}
        </select><span class="muted">Clique para editar</span></div></div>
    ${vencClientes.length?`<div style="overflow:auto"><table>${header}<tbody>${body}</tbody></table></div>`:'<div class="empty">Cadastre clientes primeiro.</div>'}`;}
function editVenc(ci,ti){const c=vencClientes[ci];if(!c)return;const tipo=VENC_TIPOS[ti];
  const ex=vencRows.find(r=>r.cliente===c.nome&&r.tipo===tipo)||{};
  const ov=document.createElement('div');ov.className='overlay';ov.id='vencOverlay';
  ov.innerHTML=`<div class="modal" style="max-width:480px"><div class="head">
    <h3>${esc(tipo)} — ${esc(c.nome)}</h3><button class="x" onclick="closeOverlay('vencOverlay')">×</button></div>
    <div class="body">
      <div class="field"><label>Documento / Nº</label><input id="vc_doc" value="${esc(ex.documento)}"></div>
      <div class="field"><label>Vencimento</label><input type="date" id="vc_venc" value="${esc(ex.vencimento)}"></div>
      <div class="field"><label>Observações</label><textarea id="vc_obs">${esc(ex.obs)}</textarea></div></div>
    <div class="foot">${ex.id?`<button class="btn-red btn-sm" onclick="delVenc(${ex.id})">Excluir</button>`:''}
      <button class="btn-out" onclick="closeOverlay('vencOverlay')">Cancelar</button>
      <button class="btn-pri" onclick="saveVenc(${ex.id||'null'},${ci},${ti})">Salvar</button></div></div>`;
  document.body.appendChild(ov);}
async function saveVenc(id,ci,ti){const c=vencClientes[ci];const tipo=VENC_TIPOS[ti];
  const payload={cliente:c.nome,tipo,documento:$('#vc_doc').value,vencimento:$('#vc_venc').value||null,obs:$('#vc_obs').value};
  try{if(id)await sbUpd('vencimentos_cliente',id,payload);else await sbIns('vencimentos_cliente',payload);
    toast('Salvo');closeOverlay('vencOverlay');loadVencimentos()}catch(e){alert('Erro:\n\n'+(e.message||''))}}
async function delVenc(id){if(!confirm('Excluir?'))return;
  try{await sbDel('vencimentos_cliente',id);toast('Excluído');closeOverlay('vencOverlay');loadVencimentos()}catch(e){alert(e.message)}}

function closeOverlay(id){const el=document.getElementById(id);if(el)el.remove()}
(function init(){const saved=store.get('plus_user');
  if(saved){try{user=JSON.parse(saved);startApp();return}catch(e){}}})();
</script>
