<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLUSCARGO — Operações Aduaneiras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --azul:#0099CC; --marinho:#1a3a5c; --azulclaro:#e6f5fb; --campo:#fffde7;
    --borda:#cfd8e3; --txt:#1f2d3d; --verde:#2e7d32; --vermelho:#c62828; --cinza:#7a8aa0;
  }
  *{box-sizing:border-box;font-family:'Segoe UI',Roboto,Arial,sans-serif}
  body{margin:0;background:#eef2f6;color:var(--txt);font-size:14px}
  button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px;transition:.15s}
  button:hover{filter:brightness(1.05)}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--borda);border-radius:6px;background:var(--campo);font-size:13px}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--azul);outline-offset:-1px}
  textarea{resize:vertical;min-height:60px}
  label{font-size:12px;font-weight:600;color:var(--marinho);display:block;margin-bottom:3px}
  .hidden{display:none!important}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:140px}
  .btn-pri{background:var(--azul);color:#fff;font-weight:600}
  .btn-mar{background:var(--marinho);color:#fff;font-weight:600}
  .btn-grn{background:var(--verde);color:#fff;font-weight:600}
  .btn-red{background:var(--vermelho);color:#fff;font-weight:600}
  .btn-out{background:#fff;border:1px solid var(--borda);color:var(--marinho)}
  .btn-sm{padding:5px 9px;font-size:12px}
  .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px;margin-bottom:14px}

  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0099CC 0%,#1a3a5c 100%)}
  #login .box{background:#fff;border-radius:16px;padding:38px 34px;width:340px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
  #login h1{margin:0 0 4px;color:var(--marinho);font-size:24px;letter-spacing:1px}
  #login p{margin:0 0 22px;color:var(--cinza);font-size:13px}
  #login label{margin-top:12px}
  #login button{width:100%;margin-top:20px;padding:11px;font-size:15px}
  #loginErr{color:var(--vermelho);font-size:12px;margin-top:10px;min-height:14px}

  #top{background:var(--marinho);color:#fff;display:flex;align-items:center;padding:0 18px;height:54px;
    position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  #top .brand{font-weight:700;letter-spacing:1px;font-size:18px}
  #top .tabs{display:flex;gap:4px;margin-left:30px}
  #top .tabs button{background:transparent;color:#cdd9e6;font-weight:600;padding:8px 16px;border-radius:6px}
  #top .tabs button.active{background:var(--azul);color:#fff}
  #top .user{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px}
  #top .user .badge{background:rgba(255,255,255,.15);padding:3px 9px;border-radius:12px;font-size:11px;text-transform:uppercase}

  #main{padding:18px;max-width:1280px;margin:0 auto}
  h2{color:var(--marinho);margin:0 0 14px;font-size:20px}
  h3{color:var(--azul);margin:18px 0 8px;font-size:15px;border-bottom:1px solid var(--azulclaro);padding-bottom:4px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--azulclaro);color:var(--marinho);text-align:left;padding:9px 10px;font-size:12px;text-transform:uppercase}
  td{padding:8px 10px;border-bottom:1px solid #eef1f5}
  tr:hover td{background:#fafcfe}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .toolbar input,.toolbar select{width:auto;min-width:150px}
  .toolbar .grow{flex:1;min-width:200px}

  .pill{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
  .pill.aberto{background:#fff3cd;color:#856404}
  .pill.liberado{background:#d4edda;color:#155724}
  .pill.finalizado{background:#d1ecf1;color:#0c5460}
  .pill.pendente{background:#fff3cd;color:#856404}
  .pill.debito{background:#f8d7da;color:#721c24}
  .pill.credito{background:#d4edda;color:#155724}

  .prog{background:#e9eef3;border-radius:8px;height:8px;overflow:hidden;min-width:80px}
  .prog>i{display:block;height:100%;background:var(--azul);transition:.3s}

  .overlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:flex;align-items:flex-start;
    justify-content:center;padding:30px 16px;z-index:100;overflow:auto}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:920px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .modal .head{background:var(--marinho);color:#fff;padding:14px 20px;border-radius:12px 12px 0 0;
    display:flex;align-items:center;justify-content:space-between}
  .modal .head h3{color:#fff;border:none;margin:0;font-size:17px}
  .modal .head .x{background:transparent;color:#fff;font-size:22px;padding:0 6px}
  .modal .subtabs{display:flex;gap:2px;background:#f1f5f9;padding:8px 14px 0}
  .modal .subtabs button{background:#dde6ef;color:var(--marinho);font-weight:600;border-radius:8px 8px 0 0;padding:9px 16px}
  .modal .subtabs button.active{background:#fff;color:var(--azul)}
  .modal .body{padding:18px 20px;max-height:64vh;overflow:auto}
  .modal .foot{padding:12px 20px;border-top:1px solid #eef1f5;display:flex;gap:10px;justify-content:flex-end}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .field{margin-bottom:4px}
  .checkitem{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f4f8;flex-wrap:wrap}
  .checkitem input[type=checkbox]{width:18px;height:18px;flex:none}
  .checkitem label{margin:0;font-weight:500;color:var(--txt);flex:1;min-width:160px}
  .checkitem input[type=datetime-local]{max-width:220px}
  .check-sec{background:#f7fafc;border:1px solid #e4ecf3;border-radius:8px;padding:12px 14px;margin-bottom:12px}
  .check-sec b{color:var(--marinho);display:block;margin-bottom:6px}
  .alerta{background:#f8d7da;color:#721c24;padding:10px 12px;border-radius:6px;font-weight:600;margin:8px 0}

  .emailprev{border:1px solid var(--borda);border-radius:8px;overflow:auto;background:#fff;max-height:340px}
  .lanc-row{display:grid;grid-template-columns:1.3fr 2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
  .saldo-box{display:flex;gap:18px;background:var(--azulclaro);border-radius:8px;padding:12px 16px;margin:10px 0;font-weight:600;flex-wrap:wrap}
  .saldo-box span{color:var(--marinho)}
  .saldo-box b{font-size:16px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--marinho);color:#fff;
    padding:11px 20px;border-radius:8px;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3);font-size:13px}
  .muted{color:var(--cinza);font-size:12px}
  .empty{text-align:center;color:var(--cinza);padding:30px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="box">
    <h1>PLUSCARGO</h1>
    <p>Operações Aduaneiras</p>
    <label>Login</label>
    <input id="lgUser" placeholder="ex: lucas.plus" autocomplete="username">
    <label>Senha</label>
    <input id="lgPass" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-pri" onclick="doLogin()">Entrar</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div id="top">
    <span class="brand">PLUSCARGO</span>
    <div class="tabs" id="tabs"></div>
    <div class="user">
      <span id="uName"></span>
      <span class="badge" id="uBadge"></span>
      <button class="btn-out btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div id="main"></div>
</div>

<script>
/* =================== CONFIG =================== */
const URL = 'https://inohrwbdeakiqztvupdq.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlub2hyd2JkZWFraXF6dHZ1cGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTA1OTQsImV4cCI6MjA5NjI4NjU5NH0.tm5gVl_0IlqSmmbktfCbUy6fcF9tPWWkX4JcC4psIOk';

const PLUS_BANCO = { banco:'Banco do Brasil (001)', agencia:'3146-1', conta:'41517-0',
  titular:'PLUSCARGO INTERNACIONAL LTDA', cnpj:'04.389.187/0001-18', pix:'financial@pluscargo.com.br' };
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function mesLabel(m){if(!m)return 'Sem mês';const[y,mo]=m.split('-');return (MESES[+mo-1]||mo)+'/'+y}

/* =================== STORAGE =================== */
const _mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return _mem[k]??null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){_mem[k]=v}},
  del(k){try{localStorage.removeItem(k)}catch(e){delete _mem[k]}}
};

/* =================== SUPABASE REST =================== */
async function sb(table,{method='GET',q='',body=null,prefer=''}={}){
  const opt={method,headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'}};
  if(prefer)opt.headers.Prefer=prefer;
  if(body)opt.body=JSON.stringify(body);
  const res=await fetch(`${URL}/rest/v1/${table}${q}`,opt);
  if(!res.ok){const t=await res.text();throw new Error(t||res.status)}
  if(method==='DELETE')return true;
  const txt=await res.text();return txt?JSON.parse(txt):[];
}
const sbGet=(t,q='')=>sb(t,{q});
const sbIns=(t,b)=>sb(t,{method:'POST',body:b,prefer:'return=representation'});
const sbUpd=(t,id,b)=>sb(t,{method:'PATCH',q:`?id=eq.${id}`,body:b,prefer:'return=representation'});
const sbDel=(t,id)=>sb(t,{method:'DELETE',q:`?id=eq.${id}`});

/* =================== STATE =================== */
let user=null;
let cache={clientes:[],transportadoras:[],locais:[],emailsTransp:[],emailsCli:[],
  honorarios:[],bancos:[],agentes:[],tiposAgenc:[],tiposImp:[]};
let activeTab=null;

/* =================== HELPERS =================== */
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtBRL=n=>(Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const parseNum=s=>{if(s==null||s==='')return 0;return Number(String(s).replace(/\./g,'').replace(',','.'))||0};
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
async function copy(text,html){
  try{
    if(html&&window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({
        'text/html':new Blob([html],{type:'text/html'}),
        'text/plain':new Blob([text],{type:'text/plain'})})]);
    }else{await navigator.clipboard.writeText(text)}
    toast('Copiado!');
  }catch(e){
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();try{document.execCommand('copy');toast('Copiado!')}catch(_){toast('Falha ao copiar')}
    ta.remove();
  }
}

/* =================== LOGIN =================== */
async function doLogin(){
  const login=$('#lgUser').value.trim().toLowerCase();
  const pass=$('#lgPass').value;
  $('#loginErr').textContent='';
  if(!login){$('#loginErr').textContent='Informe o login';return}
  try{
    const r=await sbGet('usuarios',`?login=eq.${encodeURIComponent(login)}&select=*`);
    if(!r.length){$('#loginErr').textContent='Usuário não encontrado';return}
    const u=r[0];
    if(u.senha&&pass&&u.senha!==pass){$('#loginErr').textContent='Senha incorreta';return}
    user=u;store.set('plus_user',JSON.stringify(u));startApp();
  }catch(e){$('#loginErr').textContent='Erro de conexão. Verifique o Supabase.';console.error(e)}
}
function logout(){store.del('plus_user');location.reload()}

/* =================== APP BOOT =================== */
async function startApp(){
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#uName').textContent=user.nome||user.login;
  $('#uBadge').textContent=user.perfil;
  buildTabs();
  await loadCache();
  const def=user.perfil==='financeiro'?'fechamento':'processos';
  go(def);
}
function tabsForProfile(){
  const p=user.perfil;const t=[];
  if(p==='admin'||p==='carregamento')t.push({id:'processos',label:'Processos'});
  if(p==='admin'||p==='financeiro')t.push({id:'fechamento',label:'Fechamento'});
  t.push({id:'cadastros',label:'Cadastros'});
  return t;
}
function buildTabs(){
  $('#tabs').innerHTML=tabsForProfile().map(t=>
    `<button data-tab="${t.id}" onclick="go('${t.id}')">${t.label}</button>`).join('');
}
function go(tab){
  activeTab=tab;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='processos')renderProcessos();
  else if(tab==='fechamento')renderFechamento();
  else if(tab==='cadastros')renderCadastros();
}

/* =================== CACHE =================== */
async function loadCache(){
  try{
    const[cli,tr,loc,et,ec,ho,ba,ag,ta,ti]=await Promise.all([
      sbGet('clientes','?select=*&order=nome'),
      sbGet('transportadoras','?select=*&order=nome'),
      sbGet('locais_coleta','?select=*&order=nome'),
      sbGet('emails_transportadora','?select=*'),
      sbGet('emails_cliente','?select=*'),
      sbGet('honorarios_cliente','?select=*'),
      sbGet('dados_bancarios_cliente','?select=*'),
      sbGet('agentes_carga','?select=*&order=nome'),
      sbGet('tipos_agenciamento','?select=*'),
      sbGet('tipos_imposto','?select=*'),
    ]);
    cache={clientes:cli,transportadoras:tr,locais:loc,emailsTransp:et,emailsCli:ec,
      honorarios:ho,bancos:ba,agentes:ag,tiposAgenc:ta,tiposImp:ti};
  }catch(e){console.error('cache',e);toast('Erro ao carregar cadastros')}
}
const opts=(arr,sel,key='nome')=>['<option value="">— selecione —</option>',
  ...arr.map(o=>`<option value="${esc(o[key])}" ${o[key]===sel?'selected':''}>${esc(o[key])}</option>`)].join('');

/* =================== MÓDULO 1 — PROCESSOS =================== */
let processos=[];
async function renderProcessos(){
  $('#main').innerHTML=`<h2>Processos de Carregamento</h2>
    <div class="toolbar card">
      <input class="grow" id="pBusca" placeholder="Buscar SI, NS, ref, cliente, BL, container..." oninput="filterProc()">
      <select id="pStatus" onchange="filterProc()">
        <option value="">Todos os status</option><option>aberto</option><option>liberado</option><option>finalizado</option>
      </select>
      <select id="pModal" onchange="filterProc()">
        <option value="">Todas modalidades</option><option>FCL</option><option>LCL</option><option>Aéreo</option><option>Rodoviário</option>
      </select>
      <button class="btn-pri" onclick="openProc(null)">+ Novo Processo</button>
    </div>
    <div class="card"><div id="procTable"><div class="empty">Carregando...</div></div></div>`;
  try{processos=await sbGet('processos','?select=*&order=id.desc')}catch(e){processos=[];toast('Erro ao carregar processos')}
  await loadChecklistCounts();
  await loadAvariaMap();
  filterProc();
}
let chkCounts={};
async function loadChecklistCounts(){
  try{
    const all=await sbGet('processo_checklist','?select=processo_id,concluido');
    chkCounts={};
    all.forEach(c=>{const k=c.processo_id;if(!chkCounts[k])chkCounts[k]={t:0,d:0};
      chkCounts[k].t++;if(c.concluido)chkCounts[k].d++});
  }catch(e){chkCounts={}}
}
function filterProc(){
  const q=($('#pBusca')?.value||'').toLowerCase();
  const st=$('#pStatus')?.value||'', md=$('#pModal')?.value||'';
  const list=processos.filter(p=>{
    if(st&&p.status!==st)return false;
    if(md&&p.modalidade!==md)return false;
    if(q){const blob=[p.si,p.ns,p.ref_cliente,p.cliente,p.bl,p.container].join(' ').toLowerCase();
      if(!blob.includes(q))return false}
    return true;
  });
  $('#procTable').innerHTML=list.length?`<table><thead><tr>
    <th>SI</th><th>NS</th><th>Ref.Cliente</th><th>Cliente</th><th>Modal</th><th>Transportadora</th>
    <th>Status</th><th>Avaria/Lavagem</th><th>Checklist</th><th></th></tr></thead><tbody>${
    list.map(p=>{const c=chkCounts[p.id]||{t:0,d:0};const pc=c.t?Math.round(c.d/c.t*100):0;
      return `<tr>
      <td><b>${esc(p.si)}</b></td><td>${esc(p.ns)}</td><td>${esc(p.ref_cliente)}</td>
      <td>${esc(p.cliente)}</td><td>${esc(p.modalidade)}</td><td>${esc(p.transportadora)}</td>
      <td><span class="pill ${p.status}">${esc(p.status||'aberto')}</span></td>
      <td>${avariaPill(p.si)||'<span class="muted">—</span>'}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="prog" style="flex:1"><i style="width:${pc}%"></i></div><span class="muted">${pc}%</span></div></td>
      <td><button class="btn-out btn-sm" onclick="openProc(${p.id})">Abrir</button></td></tr>`}).join('')
    }</tbody></table>`:'<div class="empty">Nenhum processo encontrado.</div>';
}

let curProc=null, curChecklist=[];
async function openProc(id){
  if(id){
    const r=await sbGet('processos',`?id=eq.${id}&select=*`);curProc=r[0]||{};
    const ch=await sbGet('processo_checklist',`?processo_id=eq.${id}&select=*`);curChecklist=ch;
  }else{curProc={status:'aberto',operador:user.nome,modalidade:'FCL'};curChecklist=[]}
  drawProcModal('dados');
}
function drawProcModal(sub){
  const p=curProc;const isFCL=p.modalidade==='FCL';const isAir=p.modalidade==='Aéreo';
  const isLCLair=p.modalidade==='LCL'||p.modalidade==='Aéreo';
  const blLabel=isAir?'AWB':'BL';
  const ov=document.createElement('div');ov.className='overlay';ov.id='procOverlay';
  ov.innerHTML=`<div class="modal">
    <div class="head"><h3>${p.id?'Processo '+esc(p.si||'#'+p.id):'Novo Processo'}</h3>
      <button class="x" onclick="closeOverlay('procOverlay')">×</button></div>
    <div class="subtabs">
      <button data-s="dados" class="${sub==='dados'?'active':''}" onclick="switchProc('dados')">Dados</button>
      <button data-s="email" class="${sub==='email'?'active':''}" onclick="switchProc('email')">E-mail de Liberação</button>
      <button data-s="check" class="${sub==='check'?'active':''}" onclick="switchProc('check')">Checklist</button>
    </div>
    <div class="body" id="procBody"></div>
  </div>`;
  document.body.appendChild(ov);
  if(sub==='dados')renderProcDados(isFCL,isAir,isLCLair,blLabel);
  else if(sub==='email')renderProcEmail();
  else renderProcCheck();
}
function switchProc(sub){collectProcDados();closeOverlay('procOverlay');drawProcModal(sub)}
function renderProcDados(isFCL,isAir,isLCLair,blLabel){
  const p=curProc;
  $('#procBody').innerHTML=`
  <div class="grid3">
    <div class="field"><label>SI</label><input id="f_si" value="${esc(p.si)}"></div>
    <div class="field"><label>NS</label><input id="f_ns" value="${esc(p.ns)}"></div>
    <div class="field"><label>Ref. Cliente</label><input id="f_ref" value="${esc(p.ref_cliente)}"></div>
  </div>
  <div class="grid3">
    <div class="field"><label>Cliente</label><select id="f_cli">${opts(cache.clientes,p.cliente)}</select></div>
    <div class="field"><label>Modalidade</label><select id="f_mod" onchange="reRenderDados()">
      ${['FCL','LCL','Aéreo','Rodoviário'].map(m=>`<option ${p.modalidade===m?'selected':''}>${m}</option>`).join('')}</select></div>
    <div class="field"><label>Transportadora</label><select id="f_tr">${opts(cache.transportadoras,p.transportadora)}</select></div>
  </div>
  <div class="grid3">
    <div class="field"><label>${blLabel}</label><input id="f_bl" value="${esc(p.bl)}"></div>
    <div class="field ${isFCL?'':'hidden'}"><label>Container</label><input id="f_cnt" value="${esc(p.container)}"></div>
    <div class="field"><label>DUIMP</label><input id="f_duimp" value="${esc(p.duimp)}"></div>
  </div>
  <div class="grid3">
    <div class="field"><label>NF</label><input id="f_nf" value="${esc(p.nf)}"></div>
    <div class="field"><label>Local de Coleta</label><select id="f_coleta">${opts(cache.locais,p.coleta)}</select></div>
    <div class="field"><label>Local de Entrega</label><input id="f_entrega" value="${esc(p.entrega)}"></div>
  </div>

const CHK={

    {k:'tr_entrega_conf',label:'Entrega confirmada',dt:true},
  ]},
};
const chkRow=k=>curChecklist.find(c=>c.item===k);
const chkDone=k=>!!chkRow(k)?.concluido;
const chkVal=k=>chkRow(k)?.valor||'';
async function setChk(k,patch){
  const ex=chkRow(k);
  try{
    if(ex){Object.assign(ex,patch);await sbUpd('processo_checklist',ex.id,{...patch,updated_at:new Date().toISOString()})}
    else{const r=await sbIns('processo_checklist',{processo_id:curProc.id,item:k,
      concluido:patch.concluido??false,valor:patch.valor??null,updated_at:new Date().toISOString()});curChecklist.push(r[0])}
  }catch(e){console.error(e);toast('Erro ao salvar checklist')}
}
async function onCheck(k,checked){await setChk(k,{concluido:checked});renderProcCheck()}
function setDt(k,v){setChk(k,{valor:v,concluido:!!v})}
async function onSelect(k,v){await setChk(k,{valor:v,concluido:!!v});renderProcCheck()}
function ckItem(it){
  const dt=it.dt?`<input type="datetime-local" value="${esc(chkVal(it.k))}" onchange="setDt('${it.k}',this.value)">`:'';
  return `<div class="checkitem">
    <input type="checkbox" ${chkDone(it.k)?'checked':''} onchange="onCheck('${it.k}',this.checked)">
    <label>${esc(it.label)}</label>${dt}</div>`;
}
function ckSelect(k,label,options){
  const cur=chkVal(k);
  return `<div class="field" style="margin-bottom:10px"><label>${esc(label)}</label>
    <select onchange="onSelect('${k}',this.value)">
      <option value="">—</option>${options.map(o=>`<option ${cur===o?'selected':''}>${o}</option>`).join('')}
    </select></div>`;
}
function secBox(def){return `<div class="check-sec"><b>${def.title}</b>${def.items.map(ckItem).join('')}</div>`}
function renderProcCheck(){
  const p=curProc;
  if(!p.id){$('#procBody').innerHTML='<div class="empty">Salve o processo (aba Dados) antes de usar o checklist.</div>';return}
  const isFCL=p.modalidade==='FCL';
  const baseKeys=[...CHK.averbacao.items,...CHK.armazenagem.items,...CHK.liberacao.items,...CHK.transporte.items].map(i=>i.k);
  let total=baseKeys.length, done=baseKeys.filter(chkDone).length;
  if(isFCL){
    total+=2; if(chkDone('dev_vazio'))done++;
    const avV={};['av_lav','av_isenta','av_comp_depot','av_pag_fin','av_comp_rec','av_comp_pasta'].forEach(k=>avV[k]=chkVal(k));
    const avSt=avariaStatus(avV);const lav=chkVal('av_lav');
    if(lav==='NÃO')done++; else if(lav&&avSt&&avSt.tone==='ok')done++;
  }
  const pc=total?Math.round(done/total*100):0;
  let avaria='';
  if(isFCL){
    avaria=`<div class="check-sec"><b>Avaria / Lavagem</b>`;
    avaria+=ckSelect('av_lav','Houve avaria / lavagem?',['SIM','NÃO','AGUARDANDO INFORMAÇÃO']);
    if(chkVal('av_lav')==='SIM'){
      avaria+=ckSelect('av_isenta','Após solicitação de isenção, a Avaria/Lavagem foi isenta?',['SIM','NÃO','EM ANÁLISE']);
      if(chkVal('av_isenta')==='SIM'){
        avaria+=ckSelect('av_comp_depot','Comprovante de isenção anexado/enviado ao DEPOT?',['SIM','NÃO']);
      }else if(chkVal('av_isenta')==='NÃO'){
        avaria+=ckSelect('av_pag_fin','O pagamento foi solicitado ao financeiro?',['SIM','NÃO']);
        if(chkVal('av_pag_fin')==='NÃO'){
          avaria+=`<div class="alerta">⚠ SOLICITAR PAGAMENTO AO FINANCEIRO ANTES DE FINALIZAR O PROCESSO</div>`;
        }else if(chkVal('av_pag_fin')==='SIM'){
          avaria+=ckSelect('av_comp_rec','Comprovante da avaria/lavagem recebido?',['SIM','NÃO']);
          avaria+=ckSelect('av_comp_pasta','Comprovante anexado na pasta do processo?',['SIM','NÃO']);
        }
      }
    }
    avaria+=`</div>`;
  }
  let devolucao='';
  if(isFCL){
    devolucao=`<div class="check-sec"><b>Devolução de Vazio</b>
      <div class="checkitem">
        <input type="checkbox" ${chkDone('dev_vazio')?'checked':''} onchange="onCheck('dev_vazio',this.checked)">
        <label>Vazio devolvido</label>
        <input type="datetime-local" value="${esc(chkVal('dev_vazio'))}" onchange="setDt('dev_vazio',this.value)">
      </div></div>`;
  }
  $('#procBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div class="prog" style="flex:1;height:12px"><i style="width:${pc}%"></i></div>
      <b style="color:var(--marinho)">${done}/${total} (${pc}%)</b>
    </div>
    ${secBox(CHK.averbacao)}${secBox(CHK.armazenagem)}${secBox(CHK.liberacao)}${secBox(CHK.transporte)}
    ${avaria}${devolucao}
    <div class="foot" style="padding:14px 0 0">
      <button class="btn-out" onclick="closeOverlay('procOverlay')">Fechar</button>
      <button class="btn-grn" onclick="finalizarProc()">Finalizar Processo</button>
    </div>`;
}
async function finalizarProc(){
  const p=curProc;
  if(!confirm('Finalizar o processo e enviar para a fila de Fechamento do financeiro?'))return;
  try{
    await sbUpd('processos',p.id,{status:'finalizado',data_finalizacao:new Date().toISOString()});
    let existe=[];

      responsavel:user.nome,status:'pendente',arquivado:false,data_hora:new Date().toISOString()});
    toast('Processo finalizado → fechamento criado');closeOverlay('procOverlay');renderProcessos();
  }catch(e){console.error(e);
    alert('Erro ao finalizar:\n\n'+((e&&e.message)||'erro desconhecido'));
    toast('Erro ao finalizar');
  }
}

/* =================== MÓDULO 2 — FECHAMENTO =================== */
let fechamentos=[], fechView='fila', avariaBySi={};
function avariaStatus(v){
  const lav=v.av_lav;
  if(lav!=='SIM'&&lav!=='AGUARDANDO INFORMAÇÃO')return null;
  if(lav==='AGUARDANDO INFORMAÇÃO')return{label:'Avaria/Lavagem — aguardando informação',short:'Pendente',tone:'pend'};
  const is=v.av_isenta;
  if(is==='SIM'){
    if(v.av_comp_depot==='SIM')return{label:'Avaria/Lavagem ISENTA',short:'Isenta',tone:'ok'};
    return{label:'Avaria/Lavagem isenta — comprovante ao DEPOT pendente',short:'Pendente',tone:'pend'};
  }
  if(is==='EM ANÁLISE'||!is)return{label:'Avaria/Lavagem EM ANÁLISE',short:'Em análise',tone:'analise'};
  if(v.av_pag_fin!=='SIM')return{label:'Avaria/Lavagem PENDENTE — pagamento não solicitado ao financeiro',short:'Pendente',tone:'pend'};
  if(v.av_comp_rec==='SIM'&&v.av_comp_pasta==='SIM')return{label:'Avaria/Lavagem resolvida (paga)',short:'Resolvida',tone:'ok'};
  return{label:'Avaria/Lavagem PENDENTE — aguardando comprovante',short:'Pendente',tone:'pend'};
}
const AVARIA_CORES={ok:'background:#d4edda;color:#155724',analise:'background:#fff3cd;color:#856404',pend:'background:#f8d7da;color:#721c24'};
function avariaPill(si,full){const a=avariaBySi[(si||'').trim()];if(!a)return '';
  return `<span class="pill" style="${AVARIA_CORES[a.tone]}">${esc(full?a.label:a.short)}</span>`}
async function loadAvariaMap(){
  avariaBySi={};
  try{
    const procs=await sbGet('processos','?select=id,si');
    const idToSi={};procs.forEach(p=>{idToSi[p.id]=(p.si||'').trim()});
    if(!procs.length)return;
    const av=await sbGet('processo_checklist','?item=in.(av_lav,av_isenta,av_comp_depot,av_pag_fin,av_comp_rec,av_comp_pasta)&select=processo_id,item,valor');
    const byProc={};av.forEach(r=>{(byProc[r.processo_id]=byProc[r.processo_id]||{})[r.item]=r.valor});
    Object.keys(byProc).forEach(pid=>{const si=idToSi[pid];const st=avariaStatus(byProc[pid]);if(si&&st)avariaBySi[si]=st});
  }catch(e){console.error('avaria',e)}
}
async function renderFechamento(){
  try{fechamentos=await sbGet('fechamentos','?select=*&order=id.desc')}catch(e){fechamentos=[];toast('Erro ao carregar')}
  await loadAvariaMap();
  $('#main').innerHTML=`<h2>Fechamento de Processo</h2>
    <div class="toolbar card" style="gap:4px">
      <button class="${fechView==='fila'?'btn-pri':'btn-out'}" onclick="fechView='fila';renderFechamento()">Fila</button>

function filterFech(){

      </td></tr>`).join('')}</tbody></table></div>`).join('')

function monthPicker(title,current,onConfirm){
  const def=current||new Date().toISOString().slice(0,7);
  const ov=document.createElement('div');ov.className='overlay';ov.id='mesOverlay';ov.style.zIndex=200;
  ov.innerHTML=`<div class="modal" style="max-width:380px"><div class="head"><h3>${title}</h3>
    <button class="x" onclick="closeOverlay('mesOverlay')">×</button></div>
    <div class="body"><div class="field"><label>Mês de referência</label>
      <input type="month" id="mesInput" value="${def}"></div>
      <div class="muted">Pode ser diferente da data de hoje (ex.: fechar em junho e atribuir a maio).</div></div>
    <div class="foot"><button class="btn-out" onclick="closeOverlay('mesOverlay')">Cancelar</button>
      <button class="btn-pri" id="mesOk">Confirmar</button></div></div>`;
  document.body.appendChild(ov);

function arquivarFech(id,mesAtual){
  const f=fechamentos.find(x=>x.id===id);
  const a=f?avariaBySi[(f.si||'').trim()]:null;
  if(a&&(a.tone==='pend'||a.tone==='analise')){
    alert('Não é possível arquivar este fechamento.\n\n'+a.label+'.\n\nA avaria/lavagem precisa estar resolvida (isenta com comprovante, ou paga com comprovantes anexados) antes de arquivar. Até lá ele continua na fila do fechamento.');
    return;
  }
  const def=mesAtual||(f&&f.data_hora?f.data_hora.slice(0,7):'');
  monthPicker('Arquivar fechamento — escolha o mês',def,async(mes)=>{
    try{await sbUpd('fechamentos',id,{arquivado:true,mes_ref:mes});toast('Arquivado em '+mesLabel(mes));renderFechamento()}
    catch(e){console.error(e);alert('Erro ao arquivar:\n\n'+(e.message||''))}
  });
}
function mudarMesFech(id,mesAtual){
  monthPicker('Alterar mês de referência',mesAtual,async(mes)=>{
    try{await sbUpd('fechamentos',id,{mes_ref:mes});toast('Movido para '+mesLabel(mes));renderFechamento()}
    catch(e){console.error(e);alert('Erro:\n\n'+(e.message||''))}
  });
}
async function reabrirFech(id){
  if(!confirm('Reabrir e voltar para a fila?'))return;
  try{await sbUpd('fechamentos',id,{arquivado:false});toast('Reaberto');renderFechamento()}
  catch(e){console.error(e);alert('Erro:\n\n'+(e.message||''))}
}
async function exportarMesPdf(mes){
  const lista=fechamentos.filter(f=>f.arquivado&&(f.mes_ref||'')===mes);
  if(!lista.length){toast('Nenhum fechamento neste mês');return}
  if(!window.jspdf||!window.jspdf.jsPDF){toast('Biblioteca PDF não carregada');return}
  let lancs=[];
  try{const ids=lista.map(f=>f.id);lancs=await sbGet('fechamento_lancamentos',`?fechamento_id=in.(${ids.join(',')})&select=*`)}
  catch(e){console.error(e)}
  const byF={};lancs.forEach(l=>{(byF[l.fechamento_id]=byF[l.fechamento_id]||[]).push(l)});
  const saldoOf=arr=>{let d=0,c=0;(arr||[]).forEach(l=>{const v=Number(l.valor)||0;if(l.tipo==='credito')c+=v;else d+=v});return c-d};
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFillColor(0,153,204);doc.rect(0,0,210,18,'F');
  doc.setTextColor(255);doc.setFontSize(14);doc.text('PRESTAÇÃO DE CONTAS - '+mesLabel(mes).toUpperCase(),14,12);
  doc.setTextColor(0);
  let total=0;
  const body=lista.map(f=>{const s=saldoOf(byF[f.id]);total+=s;
    const favor=s>0.0001?(f.cliente||'Cliente'):s<-0.0001?'PLUSCARGO':'—';
    return [f.si||'',f.cliente||'',f.modalidade||'',f.status||'',fmtBRL(s),favor];});
  doc.autoTable({startY:24,theme:'grid',styles:{fontSize:8},headStyles:{fillColor:[0,153,204],textColor:255},
    head:[['SI','Cliente','Modal','Status','Saldo','A favor de']],body,columnStyles:{4:{halign:'right'}}});
  let y=doc.lastAutoTable.finalY+8;
  doc.setFontSize(11);doc.setFont(undefined,'bold');
  doc.text('TOTAL DO MÊS: '+fmtBRL(total)+(total>0.0001?' (a favor dos clientes)':total<-0.0001?' (a favor da PLUSCARGO)':''),14,y);
  doc.save(('PRESTAÇÃO DE CONTAS - '+mesLabel(mes)).replace(/[\\/:*?"<>|]/g,'-')+'.pdf');
}
async function exportarMesExcel(mes){
  const lista=fechamentos.filter(f=>f.arquivado&&(f.mes_ref||'')===mes);
  if(!lista.length){toast('Nenhum fechamento neste mês');return}
  if(!window.XLSX){toast('Biblioteca Excel não carregada');return}
  let lancs=[];
  try{const ids=lista.map(f=>f.id);lancs=await sbGet('fechamento_lancamentos',`?fechamento_id=in.(${ids.join(',')})&select=*`)}
  catch(e){console.error(e)}
  const byF={};lancs.forEach(l=>{(byF[l.fechamento_id]=byF[l.fechamento_id]||[]).push(l)});
  const saldoOf=arr=>{let d=0,c=0;(arr||[]).forEach(l=>{const v=Number(l.valor)||0;if(l.tipo==='credito')c+=v;else d+=v});return c-d};
  const resumo=[['SI','NS','Ref. Cliente','Cliente','Modalidade','Status','Saldo','A favor de']];
  let total=0;
  lista.forEach(f=>{const s=saldoOf(byF[f.id]);total+=s;
    const favor=s>0.0001?(f.cliente||'Cliente'):s<-0.0001?'PLUSCARGO':'—';
    resumo.push([f.si||'',f.ns||'',f.ref_cliente||'',f.cliente||'',f.modalidade||'',f.status||'',s,favor]);});
  resumo.push([]);
  resumo.push(['','','','','','TOTAL DO MÊS',total,total>0.0001?'A favor dos clientes':total<-0.0001?'A favor da PLUSCARGO':'—']);
  const det=[['SI','Cliente','Categoria','Descrição','Tipo','Valor']];
  lista.forEach(f=>{(byF[f.id]||[]).forEach(l=>det.push([f.si||'',f.cliente||'',l.categoria||'',l.descricao||'',l.tipo==='credito'?'Crédito':'Débito',Number(l.valor)||0]));});
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet(resumo);
  const ws2=XLSX.utils.aoa_to_sheet(det);
  const fmt='"R$" #,##0.00';
  const aplicar=(ws,col)=>{const rg=XLSX.utils.decode_range(ws['!ref']);
    for(let r=1;r<=rg.e.r;r++){const ref=XLSX.utils.encode_cell({r,c:col});const cell=ws[ref];
      if(cell&&typeof cell.v==='number'){cell.t='n';cell.z=fmt}}};
  aplicar(ws1,6);aplicar(ws2,5);
  XLSX.utils.book_append_sheet(wb,ws1,'Resumo');
  XLSX.utils.book_append_sheet(wb,ws2,'Lançamentos');
  XLSX.writeFile(wb,('PRESTAÇÃO DE CONTAS - '+mesLabel(mes)).replace(/[\\/:*?"<>|]/g,'-')+'.xlsx');
}

let curFech=null,curLanc=[];
const LANC_CATS=['Adiantamento','Agenciamento','Frete Rodoviário','Armazenagem','Demurrage','Lavagem/Avaria de Container','Impostos Federais','ICMS','AFRMM','Honorário','IRRF/PCC','Outros'];
const CAT_TIPO={'Adiantamento':'credito','Agenciamento':'debito','Frete Rodoviário':'debito','Armazenagem':'debito',
  'Demurrage':'debito','Lavagem/Avaria de Container':'debito','Impostos Federais':'debito','ICMS':'debito',
  'AFRMM':'debito','Honorário':'debito','IRRF/PCC':'credito','Outros':'debito'};
const SUB_CATS=['Agenciamento','Impostos Federais'];
function lancValor(l){if(l.subs&&l.subs.length)return l.subs.reduce((s,x)=>s+(Number(x.valor)||0),0);return Number(l.valor)||0}
function regroupLancs(rows){
  const out=[];const groups={};
  rows.forEach(r=>{
    if(SUB_CATS.includes(r.categoria)){
      if(!groups[r.categoria]){groups[r.categoria]={categoria:r.categoria,tipo:r.tipo,agente:'',subs:[]};out.push(groups[r.categoria])}
      let desc=r.descricao||'';let ag='';const m=desc.match(/^\[([^\]]+)\]\s*(.*)$/);
      if(m){ag=m[1];desc=m[2]}if(ag&&!groups[r.categoria].agente)groups[r.categoria].agente=ag;
      groups[r.categoria].subs.push({desc,valor:r.valor});
    }else out.push({categoria:r.categoria,descricao:r.descricao,valor:r.valor,tipo:r.tipo});
  });
  return out;
}
async function openFech(id){
  if(id){const r=await sbGet('fechamentos',`?id=eq.${id}&select=*`);curFech=r[0]||{};

function renderLancs(){
  const dlA=`<datalist id="dlAgenc">${cache.tiposAgenc.map(t=>`<option value="${esc(t.descricao)}">`).join('')}</datalist>`;
  const dlI=`<datalist id="dlImp">${cache.tiposImp.map(t=>`<option value="${esc(t.descricao)}">`).join('')}</datalist>`;
  $('#lancList').innerHTML=dlA+dlI+(curLanc.map((l,i)=>lancHtml(l,i)).join('')||'<div class="muted">Nenhum lançamento.</div>');
  updateSaldo();
}
function lancHtml(l,i){
  const catSel=`<select onchange="lancCat(${i},this.value)">${LANC_CATS.map(c=>`<option ${l.categoria===c?'selected':''}>${c}</option>`).join('')}</select>`;
  const tipoSel=`<select onchange="curLanc[${i}].tipo=this.value;updateSaldo()">
      <option value="credito" ${l.tipo==='credito'?'selected':''}>Crédito</option>
      <option value="debito" ${l.tipo==='debito'?'selected':''}>Débito</option></select>`;
  if(!SUB_CATS.includes(l.categoria)){
    return `<div class="lanc-row">
      <div><label>Categoria</label>${catSel}</div>
      <div><label>Descrição</label><input value="${esc(l.descricao)}" oninput="curLanc[${i}].descricao=this.value"></div>
      <div><label>Valor</label><input value="${esc(l.valor)}" placeholder="0,00" oninput="curLanc[${i}].valor=parseNum(this.value);updateSaldo()"></div>
      <div><label>Tipo</label>${tipoSel}</div>
      <div><button class="btn-red btn-sm" onclick="curLanc.splice(${i},1);renderLancs()">×</button></div>
    </div>`;
  }
  const isAgenc=l.categoria==='Agenciamento';const dl=isAgenc?'dlAgenc':'dlImp';
  if(!l.subs)l.subs=[];
  const subsHtml=l.subs.map((s,j)=>`
    <div style="display:grid;grid-template-columns:2fr 1fr auto;gap:8px;margin-bottom:6px">
      <input list="${dl}" placeholder="Sub-taxa / descrição" value="${esc(s.desc)}" oninput="curLanc[${i}].subs[${j}].desc=this.value">
      <input placeholder="0,00" value="${esc(s.valor)}" oninput="curLanc[${i}].subs[${j}].valor=parseNum(this.value);refreshLancTotal(${i});updateSaldo()">
      <button class="btn-red btn-sm" onclick="curLanc[${i}].subs.splice(${j},1);renderLancs()">×</button>
    </div>`).join('');
  return `<div class="check-sec" style="background:#eef6fb">
    <div style="display:grid;grid-template-columns:1.4fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px">
      <div><label>Categoria</label>${catSel}</div>
      <div><label>Tipo</label>${tipoSel}</div>
      <div><button class="btn-red btn-sm" onclick="curLanc.splice(${i},1);renderLancs()">× remover</button></div>
    </div>
    ${isAgenc?`<div class="field" style="margin-bottom:8px"><label>Agente de Carga</label>
      <select onchange="curLanc[${i}].agente=this.value">${opts(cache.agentes,l.agente)}</select></div>`:''}
    <label>Sub-taxas</label>
    ${subsHtml||'<div class="muted" style="margin-bottom:6px">Nenhuma sub-taxa.</div>'}
    <button class="btn-out btn-sm" onclick="addSub(${i})">+ Sub-taxa</button>
    <div style="text-align:right;margin-top:8px;font-weight:600;color:var(--marinho)">
      Total ${esc(l.categoria)}: <span id="lancTotal_${i}">${fmtBRL(lancValor(l))}</span></div>
  </div>`;
}
function addSub(i){if(!curLanc[i].subs)curLanc[i].subs=[];curLanc[i].subs.push({desc:'',valor:0});renderLancs()}
function refreshLancTotal(i){const el=$('#lancTotal_'+i);if(el)el.textContent=fmtBRL(lancValor(curLanc[i]))}
function lancCat(i,cat){curLanc[i].categoria=cat;curLanc[i].tipo=CAT_TIPO[cat]||'debito';
  if(cat==='IRRF/PCC'){if(!confirm('Confirmar lançamento de IRRF/PCC (crédito)?')){curLanc[i].categoria='Outros';curLanc[i].tipo='debito'}}
  if(SUB_CATS.includes(curLanc[i].categoria)&&!curLanc[i].subs)curLanc[i].subs=[];
  renderLancs()}
function addLanc(){curLanc.push({categoria:'Outros',descricao:'',valor:0,tipo:'debito'});renderLancs()}
function autoHonorario(){
  const cli=($('#ff_cli')?.value||'').trim();const mod=$('#ff_mod')?.value||'';
  if(!cli)return;
  const list=cache.honorarios.filter(x=>(x.cliente||'').trim()===cli);
  const h=list.find(x=>x.modal===mod)||list.find(x=>x.modal==='Todos'||!x.modal);

    curLanc.push({categoria:'Honorário',descricao:h.descricao||'Honorário',valor:Number(h.valor)||0,tipo:'debito'});renderLancs()}
}
function calcSaldo(){let d=0,c=0;curLanc.forEach(l=>{const v=lancValor(l);
  if(l.tipo==='credito')c+=v;else d+=v});return{d,c,saldo:d-c}}
function saldoInfo(){
  const{d,c,saldo}=calcSaldo();
  const cliente=(curFech&&curFech.cliente)||'CLIENTE';
  let status,favor;
  if(saldo>0.0001){status='débito';favor='PLUSCARGO'}
  else if(saldo<-0.0001){status='crédito';favor=cliente}
  else{status='finalizado';favor='—'}
  return{d,c,abs:-saldo,status,favor};
}
function updateSaldo(){
  const{d,c,abs,status,favor}=saldoInfo();
  $('#saldoBox').innerHTML=`<span>Débitos: <b>${fmtBRL(d)}</b></span><span>Créditos: <b>${fmtBRL(c)}</b></span>
    <span>Saldo: <b style="color:var(--marinho)">${fmtBRL(abs)}</b></span>
    <span class="pill ${status.replace('é','e')}" style="align-self:center">${status}</span>
    <span style="align-self:center">A favor da <b>${esc(favor)}</b></span>`;
  const box=$('#dadosBancarios');if(box){
    if(status==='débito')box.innerHTML=bancoCard('Dados para pagamento — PLUSCARGO',PLUS_BANCO);
    else if(status==='crédito'){const cli=$('#ff_cli')?.value;const b=cache.bancos.find(x=>x.cliente===cli);
      box.innerHTML=b?bancoCard('Dados para devolução — Cliente',b):'<div class="muted" style="margin-top:8px">⚠ Cliente sem dados bancários cadastrados.</div>'}
    else box.innerHTML='';}
  return status;
}
function bancoCard(t,b){return `<div class="check-sec" style="margin-top:10px"><b>${t}</b>
  <div class="grid2">
    <div>Banco: <b>${esc(b.banco)}</b></div><div>Agência: <b>${esc(b.agencia)}</b></div>
    <div>Conta: <b>${esc(b.conta)}</b></div><div>Titular: <b>${esc(b.titular)}</b></div>
    <div>CNPJ: <b>${esc(b.cnpj)}</b></div><div>PIX: <b>${esc(b.pix)}</b></div></div></div>`}
function collectFech(){const f=curFech;
  f.si=$('#ff_si').value;f.ns=$('#ff_ns').value;f.ref_cliente=$('#ff_ref').value;f.cliente=$('#ff_cli').value;
  f.modalidade=$('#ff_mod').value;f.transportadora=$('#ff_tr').value;f.bl=$('#ff_bl').value;
  f.container=$('#ff_cnt').value;f.analista=$('#ff_an').value;f.obs=$('#ff_obs').value;
  f.status=updateSaldo();}
async function saveFech(){
  collectFech();const f=curFech;
  const payload={si:f.si,ns:f.ns,ref_cliente:f.ref_cliente,cliente:f.cliente,modalidade:f.modalidade,
    transportadora:f.transportadora,bl:f.bl,container:f.container,responsavel:f.responsavel||user.nome,
    analista:f.analista,status:f.status,obs:f.obs,data_hora:new Date().toISOString()};
  try{
    let fid=f.id;
    if(fid){await sbUpd('fechamentos',fid,payload)}
    else{const r=await sbIns('fechamentos',payload);fid=r[0].id;curFech.id=fid}
    const old=await sbGet('fechamento_lancamentos',`?fechamento_id=eq.${fid}&select=id`);
    for(const o of old)await sbDel('fechamento_lancamentos',o.id);
    for(const l of curLanc){
      if(SUB_CATS.includes(l.categoria)&&l.subs&&l.subs.length){
        for(const s of l.subs)await sbIns('fechamento_lancamentos',{fechamento_id:fid,categoria:l.categoria,
          descricao:((l.agente?'['+l.agente+'] ':'')+(s.desc||'')).trim(),valor:Number(s.valor)||0,tipo:l.tipo});
      }else{
        await sbIns('fechamento_lancamentos',{fechamento_id:fid,categoria:l.categoria,
          descricao:l.descricao,valor:Number(l.valor)||0,tipo:l.tipo});
      }
    }
    toast('Fechamento salvo');closeOverlay('fechOverlay');renderFechamento();
  }catch(e){console.error(e);
    const msg=(e&&e.message)||'erro desconhecido';
    const box=$('#fechEmailOut');
    if(box)box.innerHTML=`<div class="alerta" style="white-space:pre-wrap">Erro ao salvar:\n${esc(msg)}</div>`;
    toast('Erro ao salvar — veja o detalhe no formulário');
  }
}
async function delFech(){if(!confirm('Excluir este fechamento?'))return;
  try{const old=await sbGet('fechamento_lancamentos',`?fechamento_id=eq.${curFech.id}&select=id`);
    for(const o of old)await sbDel('fechamento_lancamentos',o.id);
    await sbDel('fechamentos',curFech.id);toast('Excluído');closeOverlay('fechOverlay');renderFechamento()}
  catch(e){toast('Erro ao excluir')}}
function fechSubject(){const f=curFech;
  return ['FECHAMENTO DE PROCESSO',f.cliente,f.si,f.ns,f.ref_cliente,f.bl].map(x=>(x||'').toString().trim()).filter(Boolean).join(' | ')}
function fechEmailHTML(){
  const f=curFech;const{abs,status,favor}=saldoInfo();
  const linha=(l,v)=>`<tr><td bgcolor="#e6f5fb" style="padding:6px 10px;color:#1a3a5c;font-weight:bold;border:1px solid #cfd8e3;width:40%">${l}</td><td style="padding:6px 10px;color:#000;border:1px solid #cfd8e3">${esc(v)}</td></tr>`;
  const lancRows=curLanc.map(l=>{
    if(SUB_CATS.includes(l.categoria)&&l.subs&&l.subs.length){
      let h=`<tr><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#1a3a5c;font-weight:bold">${esc(l.categoria)}${l.agente?' — '+esc(l.agente):''}</td>
        <td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000;text-align:right;font-weight:bold">${l.tipo==='credito'?'(C) ':'(D) '}${fmtBRL(lancValor(l))}</td></tr>`;
      h+=l.subs.map(s=>`<tr><td style="padding:4px 10px 4px 26px;border:1px solid #cfd8e3;color:#000">&bull; ${esc(s.desc)}</td>
        <td style="padding:4px 10px;border:1px solid #cfd8e3;color:#000;text-align:right">${fmtBRL(s.valor)}</td></tr>`).join('');
      return h;
    }
    return `<tr><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000">${esc(l.categoria)} ${l.descricao?'— '+esc(l.descricao):''}</td>
      <td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000;text-align:right">${l.tipo==='credito'?'(C) ':'(D) '}${fmtBRL(lancValor(l))}</td></tr>`;
  }).join('');
  let banco='';if(status==='débito')banco=bancoMail('Dados para pagamento — PLUSCARGO',PLUS_BANCO);
  else if(status==='crédito'){const b=cache.bancos.find(x=>x.cliente===f.cliente);if(b)banco=bancoMail('Dados para devolução',b)}
  return `<div style="font-family:Arial,sans-serif;font-size:13px;color:#000;margin-bottom:14px">Prezados,<br><br>Segue o fechamento do processo em referência.<br></div>
  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:680px;font-family:Arial;font-size:13px">
    <tr><td colspan="2" bgcolor="#0099CC" style="padding:12px 16px"><font color="#ffffff"><b style="font-size:16px">FECHAMENTO DE PROCESSO</b></font></td></tr>
    ${linha('Cliente',f.cliente)}${linha('SI',f.si)}${linha('NS',f.ns)}${linha('Ref. Cliente',f.ref_cliente)}${linha('Modalidade',f.modalidade)}${linha('BL/AWB',f.bl)}
    <tr><td colspan="2" bgcolor="#0099CC" style="padding:8px 16px"><font color="#ffffff"><b>LANÇAMENTOS</b></font></td></tr>
    ${lancRows}
    <tr><td style="padding:8px 10px;border:1px solid #cfd8e3;color:#1a3a5c;font-weight:bold">SALDO (${status})</td>
      <td style="padding:8px 10px;border:1px solid #cfd8e3;color:#000;text-align:right;font-weight:bold">${fmtBRL(abs)} &mdash; A FAVOR DA ${esc(favor)}</td></tr>
    <tr><td colspan="2" bgcolor="#0099CC" style="padding:10px 16px"><font color="#ffffff">PLUSCARGO Internacional Ltda</font></td></tr>
  </table>${banco}`;
}
function genFechEmail(){
  collectFech();const f=curFech;
  const fin=cache.emailsCli.filter(e=>e.cliente===f.cliente&&e.tipo==='financeiro').map(e=>e.email);
  const html=fechEmailHTML();
  $('#fechEmailOut').innerHTML=`<h3>Pré-visualização do e-mail</h3>
    <div class="emailprev" style="padding:16px">${html}</div>
    ${fin.length?`<div class="muted" style="margin-top:8px">Destinatários (cliente/financeiro): ${esc(fin.join('; '))}</div>`
      :'<div class="alerta" style="background:#fff3cd;color:#856404;margin-top:8px">⚠ Nenhum e-mail financeiro cadastrado para este cliente.</div>'}
    <div class="row" style="margin-top:10px">
      <button class="btn-out" id="copyFechDest">Copiar destinatários</button>
      <button class="btn-pri" id="copyFechBody">Copiar corpo</button>
      <button class="btn-mar" onclick="openFechOutlook()">Abrir no Outlook</button>
      <button class="btn-grn" onclick="gerarPdfFechamento()">Baixar PDF</button>
    </div>`;
  $('#copyFechDest').onclick=()=>copy(fin.join('; '));
  $('#copyFechBody').onclick=()=>copy($('#fechEmailOut .emailprev').innerText,html);
}
function openFechOutlook(){
  const f=curFech;
  const to=cache.emailsCli.filter(e=>e.cliente===f.cliente&&e.tipo==='financeiro')
    .flatMap(e=>(e.email||'').split(/[;,]/)).map(s=>s.trim()).filter(Boolean).join(';');
  const body=$('#fechEmailOut .emailprev')?$('#fechEmailOut .emailprev').innerText:'';
  const params=['subject='+encodeURIComponent(fechSubject())];
  params.push('body='+encodeURIComponent(body));
  window.location.href='mailto:'+to+'?'+params.join('&');
}
function gerarPdfFechamento(){
  collectFech();const f=curFech;
  if(!window.jspdf||!window.jspdf.jsPDF){toast('Biblioteca PDF não carregada');return}
  const{jsPDF}=window.jspdf;const doc=new jsPDF();const{abs,status,favor}=saldoInfo();
  doc.setFillColor(0,153,204);doc.rect(0,0,210,18,'F');
  doc.setTextColor(255);doc.setFontSize(15);doc.text('FECHAMENTO DE PROCESSO',14,12);
  doc.setTextColor(0);
  const idBody=[['Cliente',f.cliente||''],['SI',f.si||''],['NS',f.ns||''],['Ref. Cliente',f.ref_cliente||''],
    ['Modalidade',f.modalidade||''],['BL/AWB',f.bl||''],['Analista',f.analista||'']];
  doc.autoTable({startY:24,theme:'grid',styles:{fontSize:9},
    headStyles:{fillColor:[230,245,251],textColor:[26,58,92]},
    head:[['Campo','Valor']],body:idBody,columnStyles:{0:{cellWidth:55,fontStyle:'bold'}}});
  const body=[];
  curLanc.forEach(l=>{
    if(SUB_CATS.includes(l.categoria)&&l.subs&&l.subs.length){
      body.push([{content:l.categoria+(l.agente?' — '+l.agente:''),styles:{fontStyle:'bold'}},
        {content:(l.tipo==='credito'?'(C) ':'(D) ')+fmtBRL(lancValor(l)),styles:{fontStyle:'bold',halign:'right'}}]);
      l.subs.forEach(s=>body.push(['     • '+(s.desc||''),{content:fmtBRL(s.valor),styles:{halign:'right'}}]));
    }else{
      body.push([l.categoria+(l.descricao?' — '+l.descricao:''),
        {content:(l.tipo==='credito'?'(C) ':'(D) ')+fmtBRL(lancValor(l)),styles:{halign:'right'}}]);
    }
  });
  doc.autoTable({startY:doc.lastAutoTable.finalY+6,theme:'grid',styles:{fontSize:9},
    headStyles:{fillColor:[0,153,204],textColor:255},head:[['Lançamento','Valor']],body,
    columnStyles:{1:{cellWidth:50}}});
  let y=doc.lastAutoTable.finalY+8;
  doc.setFontSize(11);doc.setFont(undefined,'bold');
  doc.text(`SALDO (${status}): ${fmtBRL(abs)} — A FAVOR DA ${favor}`,14,y);
  doc.setFont(undefined,'normal');y+=6;
  let banco=null,bt='';
  if(status==='débito'){banco=PLUS_BANCO;bt='Dados para pagamento — PLUSCARGO'}
  else if(status==='crédito'){banco=cache.bancos.find(x=>x.cliente===f.cliente);bt='Dados para devolução — Cliente'}
  if(banco){
    doc.autoTable({startY:y+2,theme:'grid',styles:{fontSize:9},headStyles:{fillColor:[0,153,204],textColor:255},
      head:[[bt,'']],body:[['Banco',banco.banco],['Agência',banco.agencia],['Conta',banco.conta],
        ['Titular',banco.titular],['CNPJ',banco.cnpj],['PIX',banco.pix]],
      columnStyles:{0:{cellWidth:55,fontStyle:'bold'}}});
  }
  const fname=('PRESTAÇÃO DE CONTAS - '+(f.cliente||'')+' - '+(f.si||'')+' - '+(f.ns||'')+' - '+(f.ref_cliente||''))
    .replace(/[\\/:*?"<>|]/g,'-').replace(/(\s*-\s*)+$/,'').trim();
  doc.save(fname+'.pdf');
}
function bancoMail(t,b){const r=(l,v)=>`<tr><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#1a3a5c;font-weight:bold">${l}</td><td style="padding:5px 10px;border:1px solid #cfd8e3;color:#000">${esc(v)}</td></tr>`;
  return `<table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:680px;margin-top:10px;font-family:Arial;font-size:13px">
  <tr><td colspan="2" bgcolor="#0099CC" style="padding:8px 16px"><font color="#ffffff"><b>${t}</b></font></td></tr>
  ${r('Banco',b.banco)}${r('Agência',b.agencia)}${r('Conta',b.conta)}${r('Titular',b.titular)}${r('CNPJ',b.cnpj)}${r('PIX',b.pix)}</table>`}

/* =================== MÓDULO 3 — CADASTROS =================== */
const CAD_DEFS={
  clientes:{label:'Clientes',table:'clientes',fields:[['nome','Nome']],perfis:['admin','financeiro','carregamento']},
  emails_transp:{label:'E-mails Transporte',table:'emails_transportadora',
    fields:[['email','E-mail'],['transportadora','Transportadora','sel:transportadoras'],['modalidade','Modalidade','opt:FCL,LCL,Aéreo,Rodoviário']],perfis:['admin','carregamento']},
  transportadoras:{label:'Transportadoras',table:'transportadoras',fields:[['nome','Nome']],perfis:['admin','carregamento']},
  locais:{label:'Locais de Coleta',table:'locais_coleta',fields:[['nome','Nome']],perfis:['admin','carregamento']},
  bancos:{label:'Dados Bancários',table:'dados_bancarios_cliente',
    fields:[['cliente','Cliente','sel:clientes'],['banco','Banco'],['agencia','Agência'],['conta','Conta'],['titular','Titular'],['cnpj','CNPJ'],['pix','PIX']],perfis:['admin','financeiro']},
  emails_cli:{label:'E-mails de Cliente',table:'emails_cliente',
    fields:[['email','E-mail'],['cliente','Cliente','sel:clientes'],['tipo','Tipo','opt:transporte,financeiro']],perfis:['admin','financeiro','carregamento']},
  honorarios:{label:'Honorários',table:'honorarios_cliente',
    fields:[['cliente','Cliente','sel:clientes'],['modal','Modal','opt:Todos,FCL,LCL,Aéreo,Rodoviário'],['descricao','Descrição'],['valor','Valor']],perfis:['admin','financeiro']},
  agentes:{label:'Agentes de Carga',table:'agentes_carga',fields:[['nome','Nome']],perfis:['admin','financeiro']},
};
let curCad=null;
function cadKeysForProfile(){return Object.keys(CAD_DEFS).filter(k=>CAD_DEFS[k].perfis.includes(user.perfil))}
function renderCadastros(){
  const keys=cadKeysForProfile();if(!curCad||!keys.includes(curCad))curCad=keys[0];
  $('#main').innerHTML=`<h2>Cadastros</h2>
    <div class="toolbar card" style="gap:4px">${keys.map(k=>
      `<button class="${k===curCad?'btn-pri':'btn-out'}" onclick="curCad='${k}';renderCadastros()">${CAD_DEFS[k].label}</button>`).join('')}</div>
    <div class="card" id="cadArea"><div class="empty">Carregando...</div></div>`;
  loadCad();
}
async function loadCad(){
  const def=CAD_DEFS[curCad];let rows=[];
  try{const hasNome=def.fields.some(f=>f[0]==='nome');
    rows=await sbGet(def.table,`?select=*${hasNome?'&order=nome':''}`)}catch(e){toast('Erro ao carregar')}
  renderCadTable(rows);
}
function renderCadTable(rows){
  const def=CAD_DEFS[curCad];
  $('#cadArea').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="margin:0;border:none">${def.label}</h3>
      <button class="btn-pri btn-sm" onclick="openCadForm()">+ Adicionar</button></div>
    <table><thead><tr>${def.fields.map(f=>`<th>${f[1]}</th>`).join('')}<th></th></tr></thead><tbody>${
      rows.length?rows.map(r=>`<tr>${def.fields.map(f=>`<td>${esc(r[f[0]])}</td>`).join('')}
        <td style="white-space:nowrap"><button class="btn-out btn-sm" onclick='openCadForm(${JSON.stringify(r)})'>Editar</button>
        <button class="btn-red btn-sm" onclick="delCad(${r.id})">×</button></td></tr>`).join('')
      :`<tr><td colspan="${def.fields.length+1}" class="empty">Nenhum registro.</td></tr>`}</tbody></table>`;
}
function fieldInput(f,val){
  const[key,,extra]=f;
  if(extra&&extra.startsWith('sel:')){const src=extra.slice(4);
    return `<select id="cad_${key}">${opts(cache[src]||[],val)}</select>`}
  if(extra&&extra.startsWith('opt:')){const o=extra.slice(4).split(',');
    return `<select id="cad_${key}"><option value="">—</option>${o.map(x=>`<option ${x===val?'selected':''}>${x}</option>`).join('')}</select>`}
  return `<input id="cad_${key}" value="${esc(val)}">`;
}
function openCadForm(row){
  const def=CAD_DEFS[curCad];const r=row||{};
  const ov=document.createElement('div');ov.className='overlay';ov.id='cadOverlay';
  ov.innerHTML=`<div class="modal" style="max-width:520px"><div class="head">
    <h3>${r.id?'Editar':'Novo'} — ${def.label}</h3><button class="x" onclick="closeOverlay('cadOverlay')">×</button></div>
    <div class="body">${def.fields.map(f=>`<div class="field"><label>${f[1]}</label>${fieldInput(f,r[f[0]])}</div>`).join('')}</div>
    <div class="foot"><button class="btn-out" onclick="closeOverlay('cadOverlay')">Cancelar</button>
      <button class="btn-pri" onclick='saveCad(${r.id||'null'})'>Salvar</button></div></div>`;
  document.body.appendChild(ov);
}
async function saveCad(id){
  const def=CAD_DEFS[curCad];const payload={};
  def.fields.forEach(f=>{let v=$(`#cad_${f[0]}`).value;if(f[0]==='valor')v=parseNum(v);payload[f[0]]=v});
  try{if(id)await sbUpd(def.table,id,payload);else await sbIns(def.table,payload);
    toast('Salvo');closeOverlay('cadOverlay');await loadCache();loadCad()}
  catch(e){console.error(e);toast('Erro ao salvar')}
}
async function delCad(id){if(!confirm('Excluir registro?'))return;const def=CAD_DEFS[curCad];
  try{await sbDel(def.table,id);toast('Excluído');await loadCache();loadCad()}catch(e){toast('Erro ao excluir')}}

/* =================== UTIL / INIT =================== */
function closeOverlay(id){const el=$('#'+id);if(el)el.remove()}
(function init(){
  const saved=store.get('plus_user');
  if(saved){try{user=JSON.parse(saved);startApp();return}catch(e){}}
})();
</script>
</body>
</html>
